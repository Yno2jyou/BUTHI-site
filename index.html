<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>淵</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #1a1a1a; --text: #e0e0e0; --sub: #888;
    --accent: #fff; --border: #333; --font-mincho: "Sawarabi Mincho", "MS PMincho", serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mincho); margin: 0; line-height: 1.8; }
  
  /* 管理画面用スタイル */
  .admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
  .admin-nav { display: flex; gap: 15px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .admin-nav button { background: none; border: none; color: var(--sub); cursor: pointer; padding: 10px; font-family: inherit; }
  .admin-nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  
  .input-group { margin-bottom: 20px; }
  .input-group label { display: block; font-size: 0.8rem; color: var(--sub); margin-bottom: 5px; }
  input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; box-sizing: border-box; font-family: inherit; border-radius: 4px; }
  
  .gallery-section { background: #151515; padding: 20px; border-radius: 8px; border: 1px solid #222; margin-top: 20px; }
  .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  
  .btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s; }
  .btn:hover { opacity: 0.8; }
  .btn-sub { background: #333; color: #ccc; }

  /* 簡易表示用 */
  .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
  header { text-align: center; margin-bottom: 60px; }
  .logo { font-size: 2.5rem; letter-spacing: 0.8rem; cursor: pointer; display: inline-block; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ═══════════════════════════════════════════════════════
// 🔥 Firebase 設定（よっしーの設定値をここに！）
// ═══════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBYEPxGXwZW2JLLlHM7a9Ja_UNHZtv-Nug",
  authDomain: "buthi-site.firebaseapp.com",
  projectId: "buthi-site",
  storageBucket: "buthi-site.appspot.com",
  messagingSenderId: "300326075932",
  appId: "1:300326075932:web:785718df2775f284992569"
};

if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

// ─── 用語辞典管理コンポーネント ───
const GlossaryManager = ({ items }) => {
  const [newTerm, setNewTerm] = useState({ word: '', ruby: '', mean: '' });
  const add = async () => {
    if(!newTerm.word) return;
    await db.collection("glossary").add(item);
    setNewTerm({ word: '', ruby: '', mean: '' });
  };
  return (
    <div>
      <h3>📚 用語辞典</h3>
      <div style={{display:'flex', gap:'10px', marginBottom:'20px'}}>
        <input placeholder="単語" value={newTerm.word} onChange={e=>setNewTerm({...newTerm, word:e.target.value})} />
        <input placeholder="ルビ" value={newTerm.ruby} onChange={e=>setNewTerm({...newTerm, ruby:e.target.value})} />
        <button className="btn" onClick={add}>追加</button>
      </div>
      <textarea placeholder="意味・解説" value={newTerm.mean} onChange={e=>setNewTerm({...newTerm, mean:e.target.value})} />
      <hr style={{borderColor:'#222', margin:'20px 0'}} />
      {items.map(it => (
        <div key={it.id} style={{marginBottom:'15px', borderBottom:'1px solid #222', paddingBottom:'10px'}}>
          <strong>{it.word}</strong> <small>({it.ruby})</small>
          <p style={{fontSize:'0.9rem', color:'var(--sub)'}}>{it.mean}</p>
        </div>
      ))}
    </div>
  );
};

// ─── メイン管理画面 ───
const AdminPanel = ({ onClose }) => {
  const [tab, setTab] = useState("novels");
  const [novels, setNovels] = useState([]);
  const [glossary, setGlossary] = useState([]);
  const [editing, setEditing] = useState(null);

  useEffect(() => {
    const unsubN = db.collection("novels").onSnapshot(s => setNovels(s.docs.map(d => ({id:d.id, ...d.data()}))));
    const unsubG = db.collection("glossary").onSnapshot(s => setGlossary(s.docs.map(d => ({id:d.id, ...d.data()}))));
    return () => { unsubN(); unsubG(); };
  }, []);

  const save = async () => {
    if (editing.id) {
      await db.collection("novels").doc(editing.id).update(editing);
    } else {
      await db.collection("novels").add({ ...editing, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    }
    setEditing(null);
  };

  return (
    <div className="admin-panel">
      <header style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <h2>淵 - 管理室</h2>
        <button onClick={onClose} className="btn-sub">閉じる</button>
      </header>

      <nav className="admin-nav">
        <button className={tab==="novels"?"active":""} onClick={()=>setTab("novels")}>作品・ギャラリー</button>
        <button className={tab==="glossary"?"active":""} onClick={()=>setTab("glossary")}>用語辞典</button>
      </nav>

      {tab === "novels" && !editing && (
        <div>
          <button className="btn" onClick={()=>setEditing({title:'', content:'', gallery:{quotes:[], matrixX:50, matrixY:50}})}>+ 新規作品</button>
          {novels.map(n => (
            <div key={n.id} style={{padding:'15px', borderBottom:'1px solid #222', display:'flex', justifyContent:'space-between'}}>
              <span>{n.title}</span>
              <button onClick={()=>setEditing(n)}>編集</button>
            </div>
          ))}
        </div>
      )}

      {tab === "novels" && editing && (
        <div className="container">
          <h3>作品編集</h3>
          <div className="input-group">
            <label>タイトル</label>
            <input value={editing.title} onChange={e=>setEditing({...editing, title:e.target.value})} />
          </div>

          <div className="gallery-section">
            <h4>🖼 ギャラリー・分析設定</h4>
            <div className="input-group">
              <label>名言・名文（改行区切り）</label>
              <textarea rows="4" value={editing.gallery?.quotes?.join('\n')} 
                onChange={e=>setEditing({...editing, gallery:{...editing.gallery, quotes:e.target.value.split('\n')}})} />
            </div>
            <div className="input-group">
              <label>キャラクター・物語・主題の分析</label>
              <textarea rows="5" value={editing.gallery?.analysis} 
                onChange={e=>setEditing({...editing, gallery:{...editing.gallery, analysis:e.target.value}})} />
            </div>
            <div className="matrix-grid">
              <div className="input-group">
                <label>X軸 (0:静寂〜100:激動)</label>
                <input type="number" value={editing.gallery?.matrixX} onChange={e=>setEditing({...editing, gallery:{...editing.gallery, matrixX:parseInt(e.target.value)}})} />
              </div>
              <div className="input-group">
                <label>Y軸 (0:現実〜100:幻想)</label>
                <input type="number" value={editing.gallery?.matrixY} onChange={e=>setEditing({...editing, gallery:{...editing.gallery, matrixY:parseInt(e.target.value)}})} />
              </div>
            </div>
          </div>

          <div style={{marginTop:'30px', display:'flex', gap:'10px'}}>
            <button className="btn" onClick={save}>保存</button>
            <button className="btn-sub" onClick={()=>setEditing(null)}>キャンセル</button>
          </div>
        </div>
      )}

      {tab === "glossary" && <GlossaryManager items={glossary} />}
    </div>
  );
};

const App = () => {
  const [adminOpen, setAdminOpen] = useState(false);
  
  return (
    <div>
      <div className="container">
        <header>
          <div className="logo" onClick={() => setAdminOpen(true)}>淵</div>
          <p style={{color:'var(--sub)', marginTop:'20px'}}>静寂と、その深淵を綴る場所</p>
        </header>
        
        <main style={{textAlign:'center', padding:'100px 0'}}>
          <p>（ここに小説一覧や、新設したギャラリーが表示されます）</p>
          <p style={{fontSize:'0.8rem', color:'#444'}}>ロゴを長押し（クリック）で管理画面へ</p>
        </main>
      </div>

      {adminOpen && <AdminPanel onClose={() => setAdminOpen(false)} />}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
