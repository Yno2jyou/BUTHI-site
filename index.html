// ═══════════════ FIREBASE HELPERS ═══════════════
// ファイル（画像など）をFirebase Storageにアップロードし、URLを返す
async function uploadFile(file, path) {
  const ref = storage.ref(path);
  await ref.putString(file.data, "data_url");
  return await ref.getDownloadURL();
}

// base64データURIかどうかを判定
const isDataUri = s => typeof s === "string" && s.startsWith("data:");

// ひとりごとのファイル添付をStorageへアップロードし、URLに変換する
async function uploadMurmurFiles(murmurId, files) {
  return await Promise.all((files||[]).map(async (f, i) => {
    if (!isDataUri(f.data)) return f; // すでにURL済みはスキップ
    const ext = f.name.split(".").pop();
    const path = `murmurs/${murmurId}/file_${i}.${ext}`;
    const url = await uploadFile(f, path);
    return { ...f, data: url };
  }));
}

// 著者アイコンをStorageへアップロード
async function uploadAuthorIcon(dataUri) {
  if (!isDataUri(dataUri)) return dataUri;
  const ref = storage.ref("author/icon.jpg");
  await ref.putString(dataUri, "data_url");
  return await ref.getDownloadURL();
}

// ═══════════════ FIRESTORE STORE ═══════════════
function useStore() {
  const [site,    setSiteLocal]   = useState(DEFAULT_SITE);
  const [author,  setAuthorLocal] = useState(DEFAULT_AUTHOR);
  const [novels,  setNovelsLocal] = useState([]);
  const [messages,setMsgLocal]    = useState([]);
  const [gallery, setGalleryLocal]= useState(DEFAULT_GALLERY);
  const [loading, setLoading]     = useState(true);
  const [dbError, setDbError]     = useState(null);

  // ── リアルタイムリスナーで全データを購読 ──
  useEffect(() => {
    const unsubs = [];
    let resolved = 0;
    const check = () => { resolved++; if(resolved >= 5) setLoading(false); };

    // settings/site
    unsubs.push(db.collection("settings").doc("site").onSnapshot(snap => {
      if (snap.exists) setSiteLocal(snap.data()); else setSiteLocal(DEFAULT_SITE);
      check();
    }, e => { setDbError(e.message); check(); }));

    // settings/author
    unsubs.push(db.collection("settings").doc("author").onSnapshot(snap => {
      if (snap.exists) setAuthorLocal(snap.data()); else setAuthorLocal(DEFAULT_AUTHOR);
      check();
    }, e => { setDbError(e.message); check(); }));

    // settings/gallery
    unsubs.push(db.collection("settings").doc("gallery").onSnapshot(snap => {
      if (snap.exists) setGalleryLocal(snap.data()); else setGalleryLocal(DEFAULT_GALLERY);
      check();
    }, e => { setDbError(e.message); check(); }));

    // novels — ordered by createdAt
    unsubs.push(db.collection("novels").orderBy("createdAt","asc").onSnapshot(snap => {
      setNovelsLocal(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      check();
    }, e => { setDbError(e.message); check(); }));

    // messages — ordered by createdAt desc
    unsubs.push(db.collection("messages").orderBy("createdAt","desc").onSnapshot(snap => {
      setMsgLocal(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      check();
    }, e => { setDbError(e.message); check(); }));

    return () => unsubs.forEach(u => u());
  }, []);

  const uid = () => db.collection("_").doc().id; // Firestore自動ID

  // ── サイト設定 ──
  const setSite = useCallback(async v => {
    const next = typeof v === "function" ? v(site) : v;
    setSiteLocal(next);
    try { await db.collection("settings").doc("site").set(next); } catch(e) { console.error(e); }
  }, [site]);

  // ── 著者 ──
  const setAuthor = useCallback(async v => {
    const next = typeof v === "function" ? v(author) : v;
    // アイコンがbase64ならStorageへ先にアップロード
    let toSave = next;
    if (isDataUri(next.icon)) {
      try {
        const url = await uploadAuthorIcon(next.icon);
        toSave = { ...next, icon: url };
        setAuthorLocal(toSave);
      } catch(e) { console.error(e); }
    } else {
      setAuthorLocal(next);
    }
    try { await db.collection("settings").doc("author").set(toSave); } catch(e) { console.error(e); }
  }, [author]);

  // ── 作品 ──
  const addNovel = async () => {
    const now = firebase.firestore.FieldValue.serverTimestamp();
    const data = {
      title:"新しい作品", subtitle:"", author:author.name, genre:"小説",
      tags:[], description:"", color1:"#0a0a14", color2:"#1a1a2e", accent:"#c8a86a",
      wordCount:"", updated: new Date().toISOString().slice(0,7),
      chapters:[], createdAt: now,
    };
    const ref = await db.collection("novels").add(data);
    return ref.id;
  };
  const updateNovel = async (id, patch) => {
    setNovelsLocal(a => a.map(n => n.id===id ? {...n,...patch} : n)); // 楽観的更新
    try { await db.collection("novels").doc(id).update(patch); } catch(e) { console.error(e); }
  };
  const deleteNovel = async id => {
    setNovelsLocal(a => a.filter(n => n.id!==id));
    try { await db.collection("novels").doc(id).delete(); } catch(e) { console.error(e); }
  };

  // ── 章（小説ドキュメント内のchapters配列で管理） ──
  const addChapter = async nid => {
    const cid = uid();
    const ch = { id: cid, title:"新しい章", content:"" };
    const novel = novels.find(n => n.id===nid);
    const updated = [...(novel?.chapters||[]), ch];
    setNovelsLocal(a => a.map(n => n.id===nid ? {...n, chapters:updated} : n));
    try { await db.collection("novels").doc(nid).update({ chapters: updated }); } catch(e) { console.error(e); }
    return cid;
  };
  const updateChapter = async (nid, cid, patch) => {
    const novel = novels.find(n => n.id===nid);
    const updated = (novel?.chapters||[]).map(c => c.id===cid ? {...c,...patch} : c);
    setNovelsLocal(a => a.map(n => n.id===nid ? {...n, chapters:updated} : n));
    try { await db.collection("novels").doc(nid).update({ chapters: updated }); } catch(e) { console.error(e); }
  };
  const deleteChapter = async (nid, cid) => {
    const novel = novels.find(n => n.id===nid);
    const updated = (novel?.chapters||[]).filter(c => c.id!==cid);
    setNovelsLocal(a => a.map(n => n.id===nid ? {...n, chapters:updated} : n));
    try { await db.collection("novels").doc(nid).update({ chapters: updated }); } catch(e) { console.error(e); }
  };

  // ── メッセージ ──
  const addMessage = async m => {
    const data = { ...m, date: new Date().toLocaleString("ja-JP"), read: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp() };
    try { await db.collection("messages").add(data); } catch(e) { console.error(e); }
  };
  const deleteMessage = async id => {
    setMsgLocal(a => a.filter(m => m.id!==id));
    try { await db.collection("messages").doc(id).delete(); } catch(e) { console.error(e); }
  };
  const markRead = async id => {
    setMsgLocal(a => a.map(m => m.id===id ? {...m,read:true} : m));
    try { await db.collection("messages").doc(id).update({ read: true }); } catch(e) { console.error(e); }
  };

  // ── ひとりごと（author.murmurs配列で管理） ──
  const addMurmur = async (text, files) => {
    const mid = uid();
    const now = new Date();
    // ファイルをStorageへアップロード
    let uploadedFiles = [];
    try { uploadedFiles = await uploadMurmurFiles(mid, files||[]); } catch(e) { console.error(e); }
    const m = { id: mid, text, files: uploadedFiles, date: now.toLocaleString("ja-JP"), isoDate: now.toISOString() };
    const nextMurmurs = [m, ...(author.murmurs||[])];
    setAuthorLocal(a => ({...a, murmurs: nextMurmurs}));
    try { await db.collection("settings").doc("author").update({ murmurs: nextMurmurs }); } catch(e) { console.error(e); }
  };
  const deleteMurmur = async id => {
    const nextMurmurs = (author.murmurs||[]).filter(m => m.id!==id);
    setAuthorLocal(a => ({...a, murmurs: nextMurmurs}));
    try { await db.collection("settings").doc("author").update({ murmurs: nextMurmurs }); } catch(e) { console.error(e); }
  };

  // ── ギャラリー ──
  const setGallery = useCallback(async v => {
    const next = typeof v === "function" ? v(gallery) : v;
    setGalleryLocal(next);
    try { await db.collection("settings").doc("gallery").set(next); } catch(e) { console.error(e); }
  }, [gallery]);

  return { site, setSite, author, setAuthor, novels, messages, gallery, setGallery, loading, dbError,
    addMessage, deleteMessage, markRead,
    addNovel, updateNovel, deleteNovel, addChapter, updateChapter, deleteChapter,
    addMurmur, deleteMurmur };
}

// ═══════════════ HELPERS ═══════════════
function groupByYM(items, getISO) {
  const map = new Map();
  items.forEach(item => {
    let ym = "不明";
    try { const d=new Date(getISO(item)); if(!isNaN(d)) ym=`${d.getFullYear()}年${d.getMonth()+1}月`; } catch {}
    if(!map.has(ym)) map.set(ym,[]);
    map.get(ym).push(item);
  });
  return [...map.entries()];
}

    .gallery-hero-eyebrow{font-size:9px;letter-spacing:.44em;color:var(--txt3);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px}
    .gallery-hero-eyebrow::before{content:'';display:inline-block;width:22px;height:1px;background:var(--accent)}
    .gallery-hero-title{font-family:var(--serif);font-size:clamp(46px,8vw,90px);font-weight:300;color:var(--txt);line-height:.94;letter-spacing:-.02em;margin-bottom:20px}

    .gallery-hero-desc{font-size:13px;color:var(--txt3);letter-spacing:.12em;line-height:2;max-width:500px}

    .gallery-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:64px;flex-wrap:wrap}
    .gallery-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--txt3);font-family:var(--body);font-size:10px;letter-spacing:.26em;text-transform:uppercase;padding:12px 20px;cursor:pointer;transition:all .25s;margin-bottom:-1px}

    .quote-stage{min-height:380px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border:1px solid var(--border);margin-bottom:64px;overflow:hidden;cursor:pointer}
    .quote-stage-bg{position:absolute;inset:0;opacity:.04;background:radial-gradient(ellipse at center,var(--accent),transparent 70%)}
    .quote-stage-content{position:relative;padding:60px 80px 80px;text-align:center;max-width:720px;width:100%}
    .quote-text{font-family:var(--serif);font-size:clamp(16px,2.8vw,26px);font-weight:300;color:var(--txt);line-height:2;letter-spacing:.06em;font-style:italic;word-break:break-all;overflow-wrap:break-word}
    .quote-before{color:var(--accent);opacity:.5;font-size:1.3em;line-height:0;vertical-align:-.15em;font-family:var(--serif)}
    .quote-after{color:var(--accent);opacity:.5;font-size:1.3em;line-height:0;vertical-align:-.15em;font-family:var(--serif)}
    .quote-source{font-size:11px;letter-spacing:.28em;color:var(--txt3);text-transform:uppercase;line-height:1.8}
    .quote-source span{color:var(--accent);margin:0 8px}
    .quote-reason{font-size:11px;color:var(--txt3);font-style:italic;margin-top:8px;letter-spacing:.04em;line-height:1.8}
    .quote-hint{position:absolute;bottom:16px;right:20px;font-size:9px;color:var(--txt3);letter-spacing:.2em}
    .quote-dots{display:flex;gap:6px;margin-top:24px;justify-content:center}
    .quote-dot{width:5px;height:5px;border-radius:50%;background:var(--border);transition:background .3s;cursor:pointer}.quote-dot.active{background:var(--accent)}

    .quote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1px;background:var(--border);margin-bottom:48px}
    .quote-card{background:var(--bg);padding:28px 30px;transition:background .3s}.quote-card:hover{background:var(--deep)}
    .quote-card-text{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--txt);line-height:2.2;margin-bottom:14px;word-break:break-all;overflow-wrap:break-word;white-space:pre-line}
    .quote-card-source{font-size:10px;color:var(--txt3);letter-spacing:.2em;padding-top:14px;border-top:1px solid var(--border);line-height:1.8}
    .quote-card-source b{color:var(--accent);font-weight:400}
    .quote-card-reason{font-size:11px;color:var(--txt3);font-style:italic;margin-top:8px;line-height:1.8}
    /* CHARACTER */
    .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--border)}
    .char-card{background:var(--bg);padding:30px 28px;transition:background .3s}.char-card:hover{background:var(--deep)}
    .char-card-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px}
    .char-avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;font-weight:300;color:var(--bg)}

    .char-desc{font-size:13px;color:var(--txt2);line-height:2.1;margin-bottom:16px;white-space:pre-line;word-break:break-all;overflow-wrap:break-word}
    .char-traits{display:flex;gap:6px;flex-wrap:wrap}
    .char-trait{font-size:9px;letter-spacing:.14em;border:1px solid var(--border);color:var(--txt3);padding:3px 9px}
    /* THEME / MOTIF SECTION */
    .theme-grid-gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border);margin-bottom:48px}
    .theme-card{background:var(--bg);padding:28px 28px;transition:background .3s}.theme-card:hover{background:var(--deep)}
    .theme-card-novel{font-size:9px;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;margin-bottom:10px}
    .theme-card-title{font-family:var(--serif);font-size:19px;font-weight:300;color:var(--txt);margin-bottom:12px;line-height:1.3}
    .theme-card-desc{font-size:13px;color:var(--txt2);line-height:2.1;white-space:pre-line;word-break:break-all;overflow-wrap:break-word}
    .motif-list{display:flex;flex-direction:column;gap:1px;background:var(--border)}
    .motif-row{background:var(--bg);padding:24px 28px;display:grid;grid-template-columns:140px 1fr;gap:28px;align-items:start;transition:background .3s}.motif-row:hover{background:var(--deep)}

    .motif-works{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .motif-work{font-size:8px;letter-spacing:.2em;color:var(--txt3);border:1px solid var(--border);padding:2px 7px}
    .motif-desc{font-size:13px;color:var(--txt2);line-height:2.1;white-space:pre-line;word-break:break-all;overflow-wrap:break-word}
    /* TIMELINE */
    .timeline{position:relative;padding-left:48px}
    .timeline::before{content:'';position:absolute;left:12px;top:0;bottom:0;width:1px;background:var(--border)}
    .timeline-item{position:relative;margin-bottom:40px}
    .timeline-dot{position:absolute;left:-42px;top:6px;width:10px;height:10px;border-radius:50%;border:2px solid var(--accent);background:var(--bg);box-shadow:0 0 10px var(--accent-glow)}
    .timeline-year{font-size:9px;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
    .timeline-title{font-family:var(--serif);font-size:21px;font-weight:300;color:var(--txt);margin-bottom:6px}
    .timeline-genre{font-size:9px;letter-spacing:.22em;color:var(--txt3);text-transform:uppercase;margin-bottom:10px}
    .timeline-desc{font-size:13px;color:var(--txt2);line-height:2.1;max-width:600px;white-space:pre-line;word-break:break-all;overflow-wrap:break-word}
    .timeline-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .timeline-tag{font-size:8px;letter-spacing:.18em;color:var(--txt3);border:1px solid var(--border);padding:2px 7px}
    /* CORRELATION MAP */
    .corr-wrap{position:relative;width:100%;overflow-x:auto;margin-bottom:48px}
    .corr-svg{width:100%;min-width:600px}

    .matrix-wrap{overflow-x:auto;margin-bottom:48px}
    .matrix-table{width:100%;border-collapse:collapse;font-size:12px}
    .matrix-table th,.matrix-table td{border:1px solid var(--border);padding:10px 14px;text-align:left;transition:background .2s}
    .matrix-table th{background:var(--surface);color:var(--txt2);font-size:9px;letter-spacing:.22em;text-transform:uppercase;font-weight:400}
    .matrix-table td{color:var(--txt2);vertical-align:top;line-height:1.8}
    .matrix-table tr:hover td{background:var(--deep)}
    .matrix-table td:first-child{font-family:var(--serif);font-size:15px;color:var(--txt);white-space:nowrap}
    .matrix-badge{display:inline-block;font-size:8px;letter-spacing:.14em;border:1px solid var(--border);padding:1px 6px;margin:1px;color:var(--txt3)}
    .matrix-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
    /* GALLERY SECTION TITLE */
    .gal-sec{margin-bottom:48px}
    .gal-sec-head{display:flex;align-items:baseline;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .gal-sec-title{font-family:var(--serif);font-size:22px;font-weight:300;letter-spacing:.08em;color:var(--txt)}
    .gal-sec-sub{font-size:10px;letter-spacing:.28em;color:var(--txt3);text-transform:uppercase}
    /* READING DEPTH */
    .depth-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;background:var(--border);margin-bottom:16px}
    .depth-card{background:var(--bg);padding:22px 24px;transition:background .3s}.depth-card:hover{background:var(--deep)}
    .depth-card-num{font-family:var(--serif);font-size:32px;font-weight:300;color:var(--accent);display:block;line-height:1}
    .depth-card-lbl{font-size:9px;letter-spacing:.3em;color:var(--txt3);text-transform:uppercase;margin-top:4px;display:block}
    /* ADMIN GALLERY */
    .gal-admin-item{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 0}
    .gal-admin-textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--txt);font-family:var(--body);font-size:13px;padding:10px 12px;resize:vertical;border-radius:2px;line-height:1.9}
    .gal-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;margin-bottom:10px}
    @keyframes quoteIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.quote-animate{animation:quoteIn .5s ease forwards}
    @media(max-width:680px){
      .gallery-wrap{padding:100px 20px 80px}
      .quote-stage-content{padding:40px 24px}
      .motif-row{grid-template-columns:1fr}
    }
    @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .rise{animation:rise .6s ease forwards;opacity:0}.d1{animation-delay:.04s}.d2{animation-delay:.14s}.d3{animation-delay:.26s}.d4{animation-delay:.38s}
    @keyframes fadein{from{opacity:0}to{opacity:1}}.fadein{animation:fadein .3s ease forwards}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border-hi)}
    @media(max-width:680px){
      .nav{padding:0 16px}.hero{padding:100px 20px 60px}.section,.detail-body{padding-left:20px;padding-right:20px}
      .detail-hero-content{padding:0 20px}.reading-content,.reading-foot{padding-left:20px;padding-right:20px}
      .profile-wrap,.htg-wrap{padding:100px 20px 72px}.footer{padding:32px 20px}
      .admin-overlay{flex-direction:column}.admin-sidebar{width:100%;max-height:220px}
      .save-bar{left:0}.admin-main{padding:20px 16px 120px}.form-row{grid-template-columns:1fr}
    }
  `);
}

function ColorPicker({label,value,onChange}){

      <label className="form-label">{label}</label>
      <div className="color-row">
        <div className="color-swatch" style={{background:value}} onClick={()=>ref.current?.click()}/>
        <input ref={ref} type="color" value={value} onChange={e=>onChange(e.target.value)} className="color-input-hidden"/>
        <input className="form-input" style={{flex:1}} value={value} onChange={e=>onChange(e.target.value)}/>
      </div>
    </div>

}
function Footer({site}){
  return(
    <footer className="footer">
      <div className="footer-logo">{site.name||"文藻"}</div>
      <div className="footer-copy">© {new Date().getFullYear()} {site.name} — {site.footerText||"すべての著作権は各著者に帰属します"}</div>
    </footer>
  );
}
function MessageForm({target,targetLabel,onSend}){
  const [name,setName]=useState(""); const [body,setBody]=useState(""); const [sent,setSent]=useState(false);
  const submit=()=>{ if(!body.trim())return; onSend({name:name.trim()||"匿名",body:body.trim(),target,targetLabel}); setSent(true); };
  if(sent)return<div className="msg-form"><div className="msg-sent"><span className="msg-sent-icon">✉️</span>メッセージを送りました。ありがとうございます。</div></div>;
  return(
    <div className="msg-form">
      <div className="msg-form-title">作者へメッセージを送る</div>
      <div className="form-group"><label className="form-label">お名前（任意）</label><input className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="匿名"/></div>
      <div className="form-group"><label className="form-label">メッセージ</label><textarea className="form-textarea" value={body} onChange={e=>setBody(e.target.value)} rows={5} placeholder="感想・応援メッセージなど"/></div>
      <button className="btn btn-primary" onClick={submit} disabled={!body.trim()}>送信する</button>
    </div>
  );
}
function LoginModal({onSuccess,onCancel}){
  const [val,setVal]=useState(""); const [err,setErr]=useState(false); const ref=useRef();
  useEffect(()=>ref.current?.focus(),[]);
  const go=()=>{ if(val===ADMIN_PASSWORD)onSuccess(); else{ setErr(true); setVal(""); setTimeout(()=>setErr(false),1600); } };
  return(
    <div className="modal-bg fadein" onClick={onCancel}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">管理者ログイン</div>
        <p style={{color:"var(--txt3)",fontSize:12,letterSpacing:".08em",marginBottom:20}}>編集するにはパスワードが必要です</p>
        <div className="form-group">
          <input ref={ref} type="password" className="form-input" placeholder="パスワード" value={val}
            onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} style={{borderColor:err?"#ef4444":undefined}}/>
          {err&&<div style={{color:"#ef4444",fontSize:12,marginTop:6}}>パスワードが違います</div>}
        </div>
        <div className="modal-actions"><button className="btn" onClick={onCancel}>キャンセル</button><button className="btn btn-primary" onClick={go}>ログイン</button></div>
      </div>
    </div>
  );
}
function useReadingProgress(){
  const [p,setP]=useState(0);
  useEffect(()=>{
    const fn=()=>{ const el=document.documentElement; const h=el.scrollHeight-el.clientHeight; setP(h>0?(el.scrollTop/h)*100:0); };
    window.addEventListener("scroll",fn); return()=>window.removeEventListener("scroll",fn);
  },[]);
  return p;
}

// ═══════════════ HOME ═══════════════
function HomePage({site,novels,onOpen}){
  const [activeTag,setActiveTag]=useState(null);
  const [byDate,setByDate]=useState(false);
  const allTags=useMemo(()=>[...new Set(novels.flatMap(n=>n.tags||[]))] ,[novels]);

  const filtered=useMemo(()=>{
    let list=novels;
    if(activeTag) list=list.filter(n=>(n.tags||[]).includes(activeTag));
    return list;
  },[novels,activeTag]);

  const grouped=useMemo(()=>groupByYM(filtered,n=>n.updated),[filtered]);

  const lines=(site.catchcopy||"").split("、");

  const renderGrid=list=>(
    <div className="novels-grid">
      {list.length===0
        ?<div className="no-results">作品がありません</div>
        :list.map(n=>(
          <div key={n.id} className="novel-card" onClick={()=>onOpen(n)}>
            <div className="nc-cover">
              <div className="nc-cover-bg" style={{background:`linear-gradient(160deg,${n.color1},${n.color2})`}}/>
              <div className="nc-cover-fade"/><div className="nc-dot" style={{background:n.accent,boxShadow:`0 0 12px ${n.accent}88`}}/>
            </div>
            <div className="nc-body">
              <div className="nc-tags">{(n.tags||[]).slice(0,3).map(t=><span key={t} className="nc-tag">{t}</span>)}</div>
              <div className="nc-title">{n.title}</div>
              <div className="nc-subtitle">{n.subtitle}</div>
              <div className="nc-desc">{n.description}</div>
              <div className="nc-footer"><span className="nc-author">{n.author}</span><span className="nc-words">{n.wordCount}</span></div>
            </div>
          </div>
        ))
      }
    </div>
  );

  return(
    <>
      <section className="hero">
        <div className="hero-eyebrow rise d1"><span className="hero-line"/><span className="hero-label">Personal Literary Archive</span></div>
        <h1 className="hero-title rise d2">{lines.length>1?<>{lines[0]}、<br/><em>{lines.slice(1).join("、")}</em></>:site.catchcopy}</h1>
        <blockquote className="hero-quote rise d3">{site.description}</blockquote>
        <div className="hero-stats rise d4">
          <div><span className="hero-stat-num">{novels.length}</span><span className="hero-stat-lbl">作品</span></div>
          <div><span className="hero-stat-num">{novels.reduce((s,n)=>s+(n.chapters||[]).length,0)}</span><span className="hero-stat-lbl">章</span></div>
        </div>
      </section>
      <section className="section">
        <div className="section-head rise d2">
          <h2 className="section-title">収録作品</h2>
          <div className="section-right">
            <button className={`tag-chip ${byDate?"active":""}`} onClick={()=>setByDate(b=>!b)}>📅 年月別</button>
            <span className="section-meta">{filtered.length} / {novels.length}</span>
          </div>
        </div>
        <div className="tag-bar rise d3">
          <button className={`tag-chip ${!activeTag?"active":""}`} onClick={()=>setActiveTag(null)}>すべて</button>
          {allTags.map(t=><button key={t} className={`tag-chip ${activeTag===t?"active":""}`} onClick={()=>setActiveTag(activeTag===t?null:t)}>{t}</button>)}
        </div>
        <div className="rise d4">
          {byDate
            ?grouped.map(([ym,list])=><div key={ym} className="date-group"><div className="date-label">{ym}</div>{renderGrid(list)}</div>)
            :renderGrid(filtered)
          }
        </div>
      </section>
      <Footer site={site}/>
    </>
  );
}

// ═══════════════ READING ═══════════════
function ReadingPage({novel,chapterId,onBack,onChapter}){
  const ch=(novel.chapters||[]).find(c=>c.id===chapterId);
  const idx=(novel.chapters||[]).findIndex(c=>c.id===chapterId);
  const prev=(novel.chapters||[])[idx-1]||null;
  const next=(novel.chapters||[])[idx+1]||null;
  const progress=useReadingProgress();
  useEffect(()=>window.scrollTo({top:0,behavior:"smooth"}),[chapterId]);
  if(!ch)return null;
  return(
    <div>
      <div className="reading-nav">
        <button className="reading-back" onClick={onBack}>←</button>
        <div className="reading-crumb"><b>{novel.title}</b>　／　{ch.title}</div>
      </div>
      <div className="progress-rail"><div className="progress-fill" style={{width:`${progress}%`}}/></div>
      <div className="reading-content">
        <div className="reading-eyebrow rise d1">Chapter {String(idx+1).padStart(2,"0")} of {(novel.chapters||[]).length}</div>

// ═══════════════ AI GALLERY ANALYSIS ═══════════════
// Anthropic APIを使って全作品を精読・分析し、ギャラリーデータを自動生成する

async function analyzeNovelsWithAI(novels, apiKey) {
  const novelsText = novels.map(n => {
    const chaptersText = (n.chapters || []).map(c =>
      `【${c.title}】\n${c.content}`
    ).join("\n\n");
    return `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
■ 作品ID: ${n.id}
■ タイトル: 『${n.title}』
■ サブタイトル: ${n.subtitle || "なし"}
■ ジャンル: ${n.genre}
■ タグ: ${(n.tags || []).join("、")}
■ 文字数: ${n.wordCount || "不明"}
■ 更新日: ${n.updated || "不明"}
■ あらすじ: ${n.description}
■ 本文:
${chaptersText || "（本文未入力）"}`;
  }).join("\n\n");

  const prompt = `あなたは一流の文芸批評家・文学研究者です。以下の小説作品群を精読・分析してください。

${novelsText}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
上記の作品群を精読した上で、以下の形式のJSONを返してください。
JSONのみを返し、前後に説明文やMarkdownのコードブロック記号（\`\`\`など）は一切含めないこと。

{
  "quotes": [
    {
      "id": "q1",
      "text": "作品本文から抜き出した印象的な一文または短い段落。複数行になる場合は改行を\\nで表現",
      "novelId": "作品ID",
      "novelTitle": "作品タイトル",
      "chapter": "章タイトル",
      "reason": "この一文を選んだ文学的理由。40〜60字程度"
    }
  ],
  "characters": [
    {
      "id": "c1",
      "novelId": "作品ID",
      "novelTitle": "作品タイトル",
      "name": "人物名",
      "role": "役割（主人公/語り手/対話者/象徴的存在 など）",
      "accent": "この人物を象徴する16進カラーコード（例: #8b5cf6）",
      "description": "この人物の内面・心理・物語上の機能・象徴的意味の分析。句点で改行すること。100〜150字",
      "traits": ["特性1", "特性2", "特性3"]
    }
  ],
  "themes": [
    {
      "id": "t1",
      "novelId": "作品ID",
      "novelTitle": "作品タイトル",
      "title": "主題・テーマのタイトル（10字以内）",
      "description": "このテーマがどのように描かれているか、文学的考察。句点で改行すること。80〜120字"
    }
  ],
  "motifs": [
    {
      "id": "m1",
      "keyword": "繰り返し現れるモチーフのキーワード（5字以内）",
      "description": "このモチーフの文学的機能・象徴的意味・作品群での役割の分析。句点で改行すること。80〜120字",
      "novelIds": ["このモチーフが現れる作品IDのリスト"]
    }
  ],
  "timelineAnalysis": [
    {
      "novelId": "作品ID",
      "novelTitle": "作品タイトル",
      "styleNote": "この作品の文体・作風の特徴。前後の作品と比較した変化・成長を含む。60〜100字",
      "keywords": ["文体キーワード1", "文体キーワード2", "文体キーワード3"]
    }
  ],
  "correlations": [
    {
      "novelIdA": "作品AのID",
      "novelIdB": "作品BのID",
      "relation": "二作品の関係性・共鳴・対照を示すキーワード（10字以内）",
      "description": "なぜこの二作品が繋がるのかの解説。40〜60字"
    }
  ],
  "overallStyle": {
    "tendency": "作者全体の作風傾向を3〜5項目のキーワードで",
    "evolution": "作品群を通じた作風の変化・成長の総評。100〜150字",
    "distinctives": ["作者固有の特徴1", "作者固有の特徴2", "作者固有の特徴3"]
  },
  "notes": "作品群全体を俯瞰した、作風・文体・作者の姿勢に関する総括的な批評ノート。作者に直接語りかける形で書くこと。敬体（です・ます）で。200〜300字"
}

選出・分析の基準:
- 名言・名文は各作品から2〜4文、本文に実際に存在する言葉のみ。文学的に価値が高く読者の心に刺さるものを厳選
- キャラクターは本文に実際に登場する人物のみ。名前がない場合は「語り手」「彼」など本文の呼称を使う
- 主題は各作品から2〜3つ
- モチーフは作品横断的なものを優先し3〜6つ
- 相関（correlations）は実際に共鳴・対照する作品間のみ。なければ空配列でよい
- すべて日本語で記述すること
- 分析は表面的でなく、テキストの深層まで踏み込むこと`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 6000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(()=>({}));
    throw new Error(err.error?.message || `API Error ${response.status}`);
  }

  const data = await response.json();
  const rawText = (data.content || []).map(b => b.text || "").join("");
  const cleaned = rawText.replace(/^```json\s*/,"").replace(/```\s*$/,"").trim();
  return JSON.parse(cleaned);
}

// ギャラリー管理パネル（AI分析ボタン + 結果編集）
function GalleryAdminPanel({novels, gallery, setGallery, flash, saved, saving}){
  const [analyzing, setAnalyzing] = useState(false);
  const [progress, setProgress] = useState("");
  const [error, setError] = useState("");
  const [editTab, setEditTab] = useState("quotes");

  // APIキー管理
  const [apiKey, setApiKey] = useState("");
  const [apiKeyInput, setApiKeyInput] = useState("");
  const [apiKeyVisible, setApiKeyVisible] = useState(false);
  const [apiKeySaved, setApiKeySaved] = useState(false);

  // Firestoreからキーを読み込む
  useEffect(()=>{
    db.collection("settings").doc("apikey").get().then(snap=>{
      if(snap.exists && snap.data().key){
        setApiKey(snap.data().key);
        setApiKeyInput(snap.data().key);
      }
    }).catch(()=>{});
  },[]);

  const saveApiKey = async () => {
    const k = apiKeyInput.trim();
    if(!k) return;
    try {
      await db.collection("settings").doc("apikey").set({ key: k });
      setApiKey(k);
      setApiKeySaved(true);
      setTimeout(()=>setApiKeySaved(false), 2000);
    } catch(e){ console.error(e); }
  };

  const hasContent = novels.length > 0 && novels.some(n => (n.chapters||[]).some(c => c.content?.trim()));

  const runAnalysis = async () => {
    if (!apiKey) { setError("Anthropic APIキーを入力・保存してください。"); return; }
    if (!hasContent) { setError("本文が入力された作品が必要です。"); return; }
    setAnalyzing(true); setError(""); setProgress("AIが作品群を精読しています…");
    try {
      setProgress("全作品の本文・あらすじ・タグを読み込み中…");
      await new Promise(r=>setTimeout(r,400));
      setProgress("文学的分析を行っています（名言・人物・主題・モチーフ）…");
      const result = await analyzeNovelsWithAI(novels, apiKey);
      setProgress("分析完了。Firestoreに保存しています…");
      await new Promise(r=>setTimeout(r,300));
      await flash(()=>setGallery(result));
      setProgress("");
    } catch(e) {
      setError("分析中にエラーが発生しました：" + e.message);
      setProgress("");
    } finally {
      setAnalyzing(false);
    }
  };

  const quotes = gallery?.quotes || [];
  const characters = gallery?.characters || [];
  const themes = gallery?.themes || [];
  const motifs = gallery?.motifs || [];

  const tabStyle = (id) => ({
    background:"none", border:"none", borderBottom:`2px solid ${editTab===id?"var(--accent)":"transparent"}`,
    color: editTab===id?"var(--accent)":"var(--txt3)",
    fontFamily:"var(--body)", fontSize:10, letterSpacing:".22em", textTransform:"uppercase",
    padding:"10px 14px", cursor:"pointer", transition:"all .2s", marginBottom:-1,
  });

  return(
    <div>
      {/* ── APIキー設定 ── */}
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:3,padding:24,marginBottom:24}}>
        <div style={{fontSize:9,letterSpacing:".32em",color:"var(--txt3)",textTransform:"uppercase",marginBottom:14}}>
          Anthropic API Key
        </div>
        <div style={{fontSize:12,color:"var(--txt3)",lineHeight:2,marginBottom:14}}>
          AI分析にはAnthropicのAPIキーが必要です。<br/>
          <a href="https://console.anthropic.com/settings/keys" target="_blank"
            style={{color:"var(--accent)",textDecoration:"none"}}>
            console.anthropic.com
          </a> で取得した <code style={{background:"var(--raised)",padding:"1px 6px",fontSize:11}}>sk-ant-...</code> 形式のキーを入力してください。<br/>
          キーはこのサイトのFirestoreに保存され、外部には送信されません。
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{position:"relative",flex:1,minWidth:200}}>
            <input
              type={apiKeyVisible?"text":"password"}
              className="form-input"
              value={apiKeyInput}
              onChange={e=>setApiKeyInput(e.target.value)}
              placeholder="sk-ant-api03-..."
              style={{paddingRight:44,fontFamily:"monospace",fontSize:13,letterSpacing:".04em"}}
            />
            <button onClick={()=>setApiKeyVisible(v=>!v)} style={{
              position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
              background:"none",border:"none",cursor:"pointer",color:"var(--txt3)",fontSize:14,padding:4
            }}>{apiKeyVisible?"🙈":"👁"}</button>
          </div>
          <button className="btn btn-primary" onClick={saveApiKey}
            disabled={!apiKeyInput.trim()||apiKeyInput.trim()===apiKey}
            style={{whiteSpace:"nowrap",flexShrink:0}}>
            保存する
          </button>
          {apiKeySaved&&<span style={{fontSize:12,color:"var(--accent)"}}>✓ 保存しました</span>}
          {apiKey&&apiKey===apiKeyInput.trim()&&(
            <span style={{fontSize:11,color:"var(--accent)",letterSpacing:".08em"}}>✓ キー設定済み</span>
          )}
        </div>
      </div>

      {/* ── AI分析ボタンブロック ── */}
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:3,padding:28,marginBottom:32}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:20,marginBottom:20}}>
          <div style={{fontSize:28,lineHeight:1}}>✦</div>
          <div>
            <div style={{fontFamily:"var(--serif)",fontSize:18,color:"var(--txt)",marginBottom:6,letterSpacing:".04em"}}>
              AI 自動分析・登録

        </div>

        {/* 対象作品 */}
        {novels.length > 0 && (

// ═══════════════ GALLERY ═══════════════
function GalleryPage({gallery, novels, site}){
  const [tab, setTab] = useState("quotes");
  const [quoteIdx, setQuoteIdx] = useState(0);
  const [quoteAnim, setQuoteAnim] = useState(true);

  const quotes      = gallery?.quotes      || [];
  const characters  = gallery?.characters  || [];
  const themes      = gallery?.themes      || [];
  const motifs      = gallery?.motifs      || [];
  const timelineAI  = gallery?.timelineAnalysis || [];
  const correlations= gallery?.correlations|| [];
  const overallStyle= gallery?.overallStyle|| null;

  // 名言ランダムシャッフル（quotes数が変わったときだけ再計算）
  const shuffled = useMemo(()=>{
    const arr=[...quotes];
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    return arr;
  },[quotes.length]);

  const currentQuote = shuffled[quoteIdx] || null;

  const nextQuote = useCallback(()=>{
    setQuoteAnim(false);
    setTimeout(()=>{
      setQuoteIdx(i=>(i+1)%Math.max(shuffled.length,1));
      setQuoteAnim(true);
    },200);
  },[shuffled.length]);

  useEffect(()=>{
    if(!shuffled.length)return;
    const t=setInterval(nextQuote,7000);
    return()=>clearInterval(t);
  },[nextQuote,shuffled.length]);

  // 作風変遷：AI解析データとnovel情報をマージし時系列順
  const timeline = useMemo(()=>{
    return [...novels]
      .sort((a,b)=>new Date(a.updated)-new Date(b.updated))
      .map(n=>({
        ...n,
        aiNote: timelineAI.find(t=>t.novelId===n.id) || null,
      }));
  },[novels, timelineAI]);

  // 相関図：AI生成correlationsとノード
  const corrData = useMemo(()=>{
    const W=600, H=360;
    const cx=W/2, cy=H/2;
    const r = novels.length===1 ? 0 : Math.min(130, 80+novels.length*10);
    const nodes = novels.map((n,i)=>{
      const angle=(2*Math.PI*i/Math.max(novels.length,1))-Math.PI/2;
      return{...n, x:cx+r*Math.cos(angle), y:cy+r*Math.sin(angle)};
    });
    // AI生成の相関をエッジに
    const edges = correlations.map(c=>{
      const from=nodes.find(n=>n.id===c.novelIdA);
      const to  =nodes.find(n=>n.id===c.novelIdB);
      if(!from||!to)return null;
      return{from,to,label:c.relation,description:c.description};
    }).filter(Boolean);
    // AI相関がない場合は共通タグでフォールバック
    const fallbackEdges = edges.length===0 ? (()=>{
      const fb=[];
      for(let i=0;i<nodes.length;i++)
        for(let j=i+1;j<nodes.length;j++){
          const common=(nodes[i].tags||[]).filter(t=>(nodes[j].tags||[]).includes(t));
          if(common.length>0)fb.push({from:nodes[i],to:nodes[j],label:common[0],description:""});
        }
      return fb;
    })() : [];
    return{nodes,edges:edges.length?edges:fallbackEdges,cx,cy,W,H};
  },[novels,correlations]);

  // 作品マップ
  const allTags=[...new Set(novels.flatMap(n=>n.tags||[]))];
  const genres=[...new Set(novels.map(n=>n.genre).filter(Boolean))];

  // 統計
  const stats=useMemo(()=>({
    totalWords:novels.reduce((s,n)=>{const m=String(n.wordCount||"").replace(/[^0-9]/g,"");return s+(m?parseInt(m):0);},0),
    totalChapters:novels.reduce((s,n)=>s+(n.chapters||[]).length,0),
    totalNovels:novels.length,
    genreCount:new Set(novels.map(n=>n.genre)).size,
    tagCount:new Set(novels.flatMap(n=>n.tags||[])).size,
    charCount:characters.length,
    quoteCount:quotes.length,
  }),[novels,characters,quotes]);

  // AIデータ有無フラグ
  const hasAI = quotes.length>0||characters.length>0||themes.length>0;
  const noAIMsg = (label) => (
    <div style={{padding:"60px 0",textAlign:"center",color:"var(--txt3)",fontSize:13,letterSpacing:".1em",lineHeight:2}}>
      管理パネル → ギャラリー管理 → 「✦ AIで全作品を精読・分析する」<br/>を実行するとここに表示されます
    </div>
  );

  const tabs=[
    {id:"quotes",   label:"名言・名文"},
    {id:"chars",    label:"キャラクター"},
    {id:"themes",   label:"主題・考察"},
    {id:"motifs",   label:"モチーフ"},
    {id:"timeline", label:"作風変遷"},
    {id:"relation", label:"作品相関図"},
    {id:"map",      label:"作品マップ"},
    {id:"stats",    label:"データ集計"},
  ];

  return(
    <>
      <div className="gallery-wrap">
        {/* ヘッダー */}
        <div className="gallery-hero rise d1">
          <div className="gallery-hero-eyebrow">Literary Gallery</div>
          <h1 className="gallery-hero-title">ギャラリー<em>。</em></h1>
          <p className="gallery-hero-desc">
            言葉と物語の記録。名言、人物、主題、モチーフ、作風の変遷——<br/>
            すべての作品が増えるごとに、この場所も深くなっていく。
          </p>
        </div>

        {/* タブ */}
        <div className="gallery-tabs rise d2">
          {tabs.map(t=>(
            <button key={t.id} className={`gallery-tab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ══ 名言・名文 ══ */}
        {tab==="quotes"&&(
          <div className="fadein">
            {!hasAI ? noAIMsg() : currentQuote ? (
              <div className="quote-stage" onClick={nextQuote}>
                <div className="quote-stage-bg"/>
                <div className={`quote-stage-content ${quoteAnim?"quote-animate":""}`} key={quoteIdx}>
                  <div style={{marginBottom:28}}>
                    <span className="quote-before">「</span>
                    <span className="quote-text">{currentQuote.text}</span>
                    <span className="quote-after">」</span>
                  </div>
                  <div className="quote-source">
                    {currentQuote.novelTitle}
                    {currentQuote.chapter&&<><span>/</span>{currentQuote.chapter}</>}
                  </div>
                  {currentQuote.reason&&(
                    <div className="quote-reason">― {currentQuote.reason}</div>
                  )}
                  <div className="quote-dots">
                    {shuffled.map((_,i)=>(
                      <div key={i} className={`quote-dot ${i===quoteIdx?"active":""}`}
                        onClick={e=>{e.stopPropagation();setQuoteIdx(i);}}/>
                    ))}
                  </div>
                </div>
                <div className="quote-hint">クリックで次の名文へ →</div>
              </div>
            ) : null}

            <div className="gal-sec">
              <div className="gal-sec-head">
                <div className="gal-sec-title">すべての名言・名文</div>
                <div className="gal-sec-sub">{quotes.length} 選</div>
              </div>
              {quotes.length===0 ? noAIMsg() : (
                <div className="quote-grid">
                  {quotes.map(q=>(
                    <div key={q.id} className="quote-card">
                      <div className="quote-card-text">「{q.text}」</div>
                      <div className="quote-card-source">
                        <b>『{q.novelTitle}』</b>
                        {q.chapter&&<span style={{marginLeft:6}}>{q.chapter}</span>}
                      </div>
                      {q.reason&&<div className="quote-card-reason">― {q.reason}</div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ══ キャラクター ══ */}
        {tab==="chars"&&(
          <div className="fadein">
            <div className="gal-sec">
              <div className="gal-sec-head">
                <div className="gal-sec-title">登場人物</div>
                <div className="gal-sec-sub">{characters.length} 人</div>
              </div>
              {characters.length===0 ? noAIMsg() : (
                <div className="char-grid">
                  {characters.map(c=>(
                    <div key={c.id} className="char-card">

                        </div>
                        <div style={{minWidth:0}}>
                          <div className="char-name">{c.name}</div>

                          <div className="char-novel">『{c.novelTitle}』</div>
                        </div>
                      </div>
                      <div className="char-desc">{c.description}</div>
                      <div className="char-traits">
                        {(c.traits||[]).map(tr=><span key={tr} className="char-trait">{tr}</span>)}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ══ 主題・考察 ══ */}
        {tab==="themes"&&(
          <div className="fadein">
            <div className="gal-sec">
              <div className="gal-sec-head">
                <div className="gal-sec-title">物語の主題とメッセージ</div>
                <div className="gal-sec-sub">{themes.length} 項目</div>
              </div>
              {themes.length===0 ? noAIMsg() : (
                <div className="theme-grid-gal">
                  {themes.map(th=>(
                    <div key={th.id} className="theme-card">
                      <div className="theme-card-novel">『{th.novelTitle}』</div>

                    </div>
                  ))}

              )}
            </div>
            {gallery?.notes&&(
              <div className="gal-sec">
                <div className="gal-sec-head"><div className="gal-sec-title">批評ノート</div></div>
                <div style={{fontFamily:"'Noto Serif JP',serif",fontSize:15,lineHeight:2.6,color:"var(--txt2)",maxWidth:680,whiteSpace:"pre-line",borderLeft:"2px solid var(--accent-glow)",paddingLeft:28,letterSpacing:".04em"}}>
                  {gallery.notes}
                </div>
              </div>

          </div>

        {/* ══ モチーフ ══ */}
        {tab==="motifs"&&(
          <div className="fadein">
            <div className="gal-sec">
              <div className="gal-sec-head">

              {motifs.length===0 ? noAIMsg() : (
                <div className="motif-list">

        {/* ══ 作風変遷 ══ */}

                        <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
                          <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.04"/>

                            <rect x={mx-28} y={my-9} width={56} height={18} rx="3"

                            <text x={mx} y={my+1} fill="rgba(200,168,106,0.8)" fontSize="8"
