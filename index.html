                    <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:10}}>
                      {corrData.edges.filter(e=>e.description).map((e,i)=>(
                        <div key={i} style={{display:"flex",alignItems:"baseline",gap:12,fontSize:12,color:"var(--txt2)",lineHeight:1.9}}>
                          <span style={{color:"var(--accent)",whiteSpace:"nowrap",flexShrink:0}}>
                            『{e.from.title}』× 『{e.to.title}』
                          </span>
                          <span>{e.description}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {/* 凡例 */}
                  <div style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:28}}>
                    {novels.map(n=>(
                      <div key={n.id} style={{display:"flex",alignItems:"center",gap:7,fontSize:11,color:"var(--txt2)"}}>
                        <div style={{width:9,height:9,borderRadius:"50%",background:n.accent||"var(--accent)",boxShadow:`0 0 6px ${n.accent}66`,flexShrink:0}}/>
                        {n.title}
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>
        )}

        {/* ══ 作品マップ ══ */}
        {tab==="map"&&(
          <div className="fadein">
            <div className="gal-sec">
              <div className="gal-sec-head">
                <div className="gal-sec-title">作品マップ</div>
                <div className="gal-sec-sub">マトリックス表</div>
              </div>
              <div className="matrix-wrap">
                <table className="matrix-table">
                  <thead>
                    <tr>
                      <th>作品名</th>
                      <th>ジャンル</th>
                      <th>主題タグ</th>
                      <th>文字数</th>
                      <th>更新</th>
                      <th>登場人物</th>
                      <th>色調</th>
                    </tr>
                  </thead>
                  <tbody>
                    {novels.length===0 ? (
                      <tr><td colSpan={7} style={{color:"var(--txt3)",padding:"32px",textAlign:"center"}}>作品がまだありません</td></tr>
                    ) : novels.map(n=>{
                      const novelChars=characters.filter(c=>c.novelId===n.id);
                      return(
                        <tr key={n.id}>
                          <td>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div className="matrix-dot" style={{background:n.accent||"var(--accent)",boxShadow:`0 0 6px ${n.accent}44`}}/>
                              {n.title}
                            </div>
                          </td>
                          <td>{n.genre}</td>
                          <td>{(n.tags||[]).map(t=><span key={t} className="matrix-badge">{t}</span>)}</td>
                          <td style={{whiteSpace:"nowrap"}}>{n.wordCount}</td>
                          <td style={{whiteSpace:"nowrap"}}>{fmtDate(n.updated)}</td>
                          <td>{novelChars.length>0
                            ? novelChars.map((c,i)=>(
                                <span key={c.id}>
                                  {i>0&&<span style={{color:"var(--txt3)",margin:"0 4px"}}>・</span>}
                                  {c.name}
                                </span>
                              ))
                            : <span style={{color:"var(--txt3)"}}>—</span>
                          }</td>
                          <td>
                            <div style={{width:36,height:18,borderRadius:2,background:`linear-gradient(90deg,${n.color1},${n.color2})`,border:"1px solid rgba(255,255,255,.1)"}}/>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
            {/* タグ×作品 */}
            {novels.length>0&&allTags.length>0&&(
              <div className="gal-sec">
                <div className="gal-sec-head">
                  <div className="gal-sec-title">タグ × 作品 対応表</div>
                </div>
                <div className="matrix-wrap">
                  <table className="matrix-table">
                    <thead>
                      <tr>
                        <th style={{minWidth:100}}>タグ</th>
                        {novels.map(n=><th key={n.id}>{n.title}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {allTags.map(tag=>(
                        <tr key={tag}>
                          <td style={{color:"var(--accent)",fontFamily:"var(--body)",letterSpacing:".04em"}}>{tag}</td>
                          {novels.map(n=>(
                            <td key={n.id} style={{textAlign:"center",fontSize:14}}>
                              {(n.tags||[]).includes(tag)
                                ?<span style={{color:"var(--accent)"}}>●</span>
                                :<span style={{color:"var(--border-hi)",opacity:.4}}>○</span>
                              }
                            </td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ データ集計 ══ */}
        {tab==="stats"&&(
          <div className="fadein">
            <div className="gal-sec">
              <div className="gal-sec-head">
                <div className="gal-sec-title">データ集計</div>
                <div className="gal-sec-sub">Numbers</div>
              </div>
              <div className="depth-grid">
                {[
                  {num:stats.totalNovels,       lbl:"総作品数"},
                  {num:stats.totalChapters,     lbl:"総章数"},
                  {num:stats.totalWords>0?stats.totalWords.toLocaleString()+"字":"—", lbl:"総文字数（概算）"},
                  {num:stats.genreCount,        lbl:"ジャンル数"},
                  {num:stats.tagCount,          lbl:"使用タグ数"},
                  {num:stats.charCount,         lbl:"登録人物数"},
                  {num:stats.quoteCount,        lbl:"収録名文数"},
                  {num:motifs.length,           lbl:"収録モチーフ数"},
                ].map((d,i)=>(
                  <div key={i} className="depth-card">
                    <span className="depth-card-num">{d.num}</span>
                    <span className="depth-card-lbl">{d.lbl}</span>
                  </div>
                ))}
              </div>
            </div>

            {genres.length>0&&(
              <div className="gal-sec">
                <div className="gal-sec-head"><div className="gal-sec-title">ジャンル分布</div></div>
                {genres.map(g=>{
                  const cnt=novels.filter(n=>n.genre===g).length;
                  const pct=Math.round(cnt/Math.max(novels.length,1)*100);
                  return(
                    <div key={g} style={{marginBottom:20}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,fontSize:13,color:"var(--txt2)"}}>
                        <span>{g}</span>
                        <span style={{color:"var(--accent)",fontSize:11}}>{cnt}作品　{pct}%</span>
                      </div>
                      <div style={{height:2,background:"var(--border)",borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pct}%`,background:"var(--accent)",borderRadius:2}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {allTags.length>0&&(
              <div className="gal-sec">
                <div className="gal-sec-head"><div className="gal-sec-title">タグの頻度</div></div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap",lineHeight:2}}>
                  {allTags.map(tag=>{
                    const cnt=novels.filter(n=>(n.tags||[]).includes(tag)).length;
                    const size=12+cnt*2;
                    return(
                      <span key={tag} style={{
                        fontSize:size,fontFamily:"'Noto Serif JP',serif",
                        color:`color-mix(in srgb,var(--accent) ${Math.min(30+cnt*25,90)}%,var(--txt3))`,
                        border:"1px solid var(--border)",padding:"3px 12px",
                      }}>{tag}</span>
                    );
                  })}
                </div>
              </div>
            )}

            {overallStyle?.tendency&&(
              <div className="gal-sec">
                <div className="gal-sec-head"><div className="gal-sec-title">作者の作風傾向</div></div>
                <div style={{fontSize:14,color:"var(--txt2)",lineHeight:2.4,whiteSpace:"pre-line",maxWidth:640,letterSpacing:".04em"}}>
                  {overallStyle.tendency}
                </div>
              </div>
            )}
          </div>
        )}

      </div>
      <Footer site={site||{}}/>
    </>
  );
}

// ═══════════════ ADMIN ═══════════════
function AdminPanel({store,onClose}){
  const {site,setSite,author,setAuthor,novels,messages,deleteMessage,markRead,
    gallery,setGallery,
    addNovel,updateNovel,deleteNovel,addChapter,updateChapter,deleteChapter,addMurmur,deleteMurmur}=store;
  const [sec,setSec]=useState("site");
  const [editNid,setEditNid]=useState(null);
  const [editCh,setEditCh]=useState(null);
  const [delConfirm,setDelConfirm]=useState(null);
  const [saved,setSaved]=useState(false);
  const [newMurmur,setNewMurmur]=useState("");
  const [newFiles,setNewFiles]=useState([]);
  const [newLL,setNewLL]=useState(""); const [newLU,setNewLU]=useState("");
  const fileRef=useRef();

  const [saving,setSaving]=useState(false);
  const flash=async (fn) => {
    setSaving(true);
    try { if(fn) await fn(); } catch(e){ console.error(e); }
    setSaved(true); setSaving(false);
    setTimeout(()=>setSaved(false),2000);
  };
  const eNov=novels.find(n=>n.id===editNid);
  const unread=(messages||[]).filter(m=>!m.read).length;

  const handleFiles=e=>{
    const files=Array.from(e.target.files);
    Promise.all(files.map(f=>new Promise(res=>{
      const r=new FileReader();
      r.onload=ev=>res({name:f.name,data:ev.target.result,type:f.type.startsWith("image/")?"image":"file"});
      r.readAsDataURL(f);
    }))).then(rs=>setNewFiles(p=>[...p,...rs]));
    e.target.value="";
  };

  const sideItems=[
    {id:"site",label:"サイト設定",icon:"🏠"},
    {id:"author",label:"著者プロフィール",icon:"✍️"},
    {id:"links",label:"SNS・リンク",icon:"🔗"},
    {id:"hitorigoto",label:"ひとりごと管理",icon:"💬"},
    {id:"messages",label:"受信メッセージ",icon:"✉️",badge:unread},
    {id:"theme",label:"デザイン・テーマ",icon:"🎨"},
    {id:"novels",label:"作品管理",icon:"📚"},
    {id:"gallery",label:"ギャラリー管理",icon:"✦"},
  ];

  return(
    <div className="admin-overlay fadein">
      <div className="admin-sidebar">
        <div className="admin-logo"><div className="admin-logo-txt">管理パネル</div><div className="admin-logo-sub">Admin Panel</div></div>
        <nav className="admin-nav">
          <div className="admin-nav-group">
            <span className="admin-nav-label">設定</span>
            {sideItems.map(item=>(
              <button key={item.id} className={`admin-nav-item ${sec===item.id?"active":""}`}
                onClick={()=>{ setSec(item.id); setEditNid(null); setEditCh(null); }}>
                {item.icon} {item.label}{item.badge>0&&<span className="badge">{item.badge}</span>}
              </button>
            ))}
          </div>
          {editNid&&(
            <div className="admin-nav-group">
              <span className="admin-nav-label">編集中</span>
              <button className={`admin-nav-item ${sec==="novel_edit"?"active":""}`} onClick={()=>setSec("novel_edit")}>
                📝 {eNov?.title||"作品"}
              </button>
            </div>
          )}
        </nav>
        <div className="admin-close"><button className="admin-close-btn" onClick={onClose}>← サイトに戻る</button></div>
      </div>

      <div className="admin-main">

        {sec==="site"&&(
          <div className="fadein">
            <div className="admin-title">サイト設定</div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">サイト名</label><input className="form-input" value={site.name} onChange={e=>setSite(s=>({...s,name:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">ローマ字</label><input className="form-input" value={site.nameRoman} onChange={e=>setSite(s=>({...s,nameRoman:e.target.value}))}/></div>
            </div>
            <div className="form-group"><label className="form-label">キャッチコピー（「、」で折り返し）</label><input className="form-input" value={site.catchcopy} onChange={e=>setSite(s=>({...s,catchcopy:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">サブコピー</label><textarea className="form-textarea" value={site.description} onChange={e=>setSite(s=>({...s,description:e.target.value}))} rows={4}/></div>
            <div className="form-group"><label className="form-label">フッターテキスト</label><input className="form-input" value={site.footerText||""} onChange={e=>setSite(s=>({...s,footerText:e.target.value}))}/></div>
            <button className="btn btn-primary" onClick={()=>flash()}>保存する</button><span style={{marginLeft:12,fontSize:12,color:"var(--accent)"}}>{saving?"⌛ 保存中…":saved?"✓ 保存しました":""}</span>
          </div>
        )}

        {sec==="author"&&(
          <div className="fadein">
            <div className="admin-title">著者プロフィール</div>
            <div className="form-group">
              <label className="form-label">著者アイコン</label>
              <div style={{display:"flex",alignItems:"center",gap:16}}>
                <div className="profile-avatar" style={{width:72,height:72,fontSize:28,flexShrink:0}}>
                  {author.icon?<img src={author.icon} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:author.name.charAt(0)}
                </div>
                <div>
                  <label style={{cursor:"pointer"}}><span className="btn" style={{display:"inline-block"}}>📁 選択</span>
                    <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>setAuthor(a=>({...a,icon:ev.target.result})); r.readAsDataURL(f); }}/>
                  </label>
                  {author.icon&&<button className="btn btn-danger" style={{marginLeft:8}} onClick={()=>setAuthor(a=>({...a,icon:""}))}>削除</button>}
                  <div className="form-hint" style={{marginTop:6}}>JPG / PNG / GIF</div>
                </div>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">著者名</label><input className="form-input" value={author.name} onChange={e=>setAuthor(a=>({...a,name:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">ローマ字</label><input className="form-input" value={author.nameRoman} onChange={e=>setAuthor(a=>({...a,nameRoman:e.target.value}))}/></div>
            </div>
            <div className="form-group"><label className="form-label">創作開始年</label><input className="form-input" value={author.since} onChange={e=>setAuthor(a=>({...a,since:e.target.value}))} style={{maxWidth:160}}/></div>
            <div className="form-group"><label className="form-label">プロフィール文</label><textarea className="form-textarea" value={author.bio} onChange={e=>setAuthor(a=>({...a,bio:e.target.value}))} rows={6}/></div>
            <div className="form-group"><label className="form-label">影響を受けた作品（カンマ区切り）</label><input className="form-input" value={author.influences} onChange={e=>setAuthor(a=>({...a,influences:e.target.value}))}/></div>
            <button className="btn btn-primary" onClick={()=>flash()}>保存する</button><span style={{marginLeft:12,fontSize:12,color:"var(--accent)"}}>{saving?"⌛ 保存中…":saved?"✓ 保存しました":""}</span>
          </div>
        )}

        {sec==="links"&&(
          <div className="fadein">
            <div className="admin-title">SNS・リンク</div>
            <div className="alist" style={{marginBottom:24}}>
              {(author.links||[]).length===0&&<div style={{padding:"16px",color:"var(--txt3)",fontSize:13}}>リンクがありません</div>}
              {(author.links||[]).map((lk,i)=>(
                <div key={i} className="arow">
                  <span style={{fontSize:18}}>{linkIcon(lk.url)}</span>
                  <div className="arow-info"><div className="arow-title">{lk.label||"（なし）"}</div><div className="arow-meta">{lk.url}</div></div>
                  <button className="icon-btn danger" onClick={()=>setAuthor(a=>({...a,links:(a.links||[]).filter((_,j)=>j!==i)}))}>🗑</button>
                </div>
              ))}
            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",padding:20,borderRadius:2}}>
              <div className="form-row">
                <div className="form-group" style={{marginBottom:12}}><label className="form-label">表示名</label><input className="form-input" value={newLL} onChange={e=>setNewLL(e.target.value)} placeholder="X (Twitter)"/></div>
                <div className="form-group" style={{marginBottom:12}}><label className="form-label">URL</label><input className="form-input" value={newLU} onChange={e=>setNewLU(e.target.value)} placeholder="https://x.com/yourname"/></div>
              </div>
              <button className="btn btn-primary" disabled={!newLU.trim()} onClick={async()=>{ await flash(()=>setAuthor(a=>({...a,links:[...(a.links||[]),{label:newLL.trim(),url:newLU.trim()}]}))); setNewLL(""); setNewLU(""); }}>追加する</button>
              {saved&&<span style={{marginLeft:12,fontSize:12,color:"var(--accent)"}}>✓ 追加しました</span>}
            </div>
          </div>
        )}

        {sec==="hitorigoto"&&(
          <div className="fadein">
            <div className="admin-title">ひとりごと</div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",padding:20,borderRadius:2,marginBottom:24}}>
              <div className="form-group" style={{marginBottom:12}}><label className="form-label">新しい投稿</label>
                <textarea className="form-textarea" value={newMurmur} onChange={e=>setNewMurmur(e.target.value)} rows={4} placeholder="ふと思ったこと、執筆の近況など…"/>
              </div>
              <input ref={fileRef} type="file" multiple accept="image/*,application/pdf,.txt,.doc,.docx" style={{display:"none"}} onChange={handleFiles}/>
              <button className="btn" style={{marginBottom:newFiles.length>0?12:0}} onClick={()=>fileRef.current?.click()}>📎 写真・ファイルを添付</button>
              {newFiles.length>0&&(
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
                  {newFiles.map((f,i)=>(
                    <div key={i} style={{position:"relative"}}>
                      {f.type==="image"
                        ?<img src={f.data} alt="" style={{width:64,height:64,objectFit:"cover",border:"1px solid var(--border)",borderRadius:2}}/>
                        :<div style={{border:"1px solid var(--border)",padding:"6px 10px",fontSize:11,color:"var(--txt2)",borderRadius:2}}>📎 {f.name}</div>
                      }
                      <button onClick={()=>setNewFiles(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:-5,right:-5,background:"#ef4444",border:"none",color:"#fff",width:16,height:16,borderRadius:"50%",cursor:"pointer",fontSize:9,lineHeight:"16px",textAlign:"center"}}>✕</button>
                    </div>
                  ))}
                </div>
              )}
              <button className="btn btn-primary" disabled={saving||(!newMurmur.trim()&&newFiles.length===0)} onClick={async()=>{ await flash(()=>addMurmur(newMurmur.trim(),newFiles)); setNewMurmur(""); setNewFiles([]); }}>投稿する</button>
              {saving&&<span style={{marginLeft:12,fontSize:12,color:"var(--txt3)"}}>⌛ アップロード中…</span>}
              {!saving&&saved&&<span style={{marginLeft:12,fontSize:12,color:"var(--accent)"}}>✓ 投稿しました</span>}
            </div>
            <div className="msg-list">
              {(author.murmurs||[]).length===0&&<div style={{padding:"16px",color:"var(--txt3)",fontSize:13}}>まだ投稿がありません</div>}
              {(author.murmurs||[]).map(m=>(
                <div key={m.id} className="msg-row" style={{cursor:"default"}}>
                  <div className="msg-body">{m.text}</div>
                  {(m.files||[]).length>0&&<div style={{display:"flex",gap:6,marginTop:8}}>
                    {(m.files||[]).map((f,i)=>f.type==="image"?<img key={i} src={f.data} alt="" style={{width:48,height:48,objectFit:"cover",border:"1px solid var(--border)",borderRadius:2}}/>:<span key={i} style={{fontSize:11,color:"var(--txt3)"}}>📎{f.name}</span>)}
                  </div>}
                  <div className="msg-acts"><span className="msg-date">{m.date}</span><button className="icon-btn danger" style={{marginLeft:"auto",fontSize:11}} onClick={()=>deleteMurmur(m.id)}>🗑 削除</button></div>
                </div>
              ))}
            </div>
          </div>
        )}

        {sec==="messages"&&(
          <div className="fadein">
            <div className="admin-title">受信メッセージ {unread>0&&<span className="badge" style={{fontSize:14}}>{unread}件未読</span>}</div>
            <div className="msg-list">
              {(messages||[]).length===0&&<div style={{padding:"24px",color:"var(--txt3)",fontSize:13}}>メッセージがありません</div>}
              {(messages||[]).map(m=>(
                <div key={m.id} className={`msg-row ${!m.read?"unread":""}`} onClick={()=>markRead(m.id)}>
                  <div className="msg-hdr"><span className="msg-name">{m.name}</span><span className="msg-target">{m.targetLabel}</span><span className="msg-date">{m.date}</span>{!m.read&&<span style={{fontSize:10,color:"var(--accent)"}}>NEW</span>}</div>
                  <div className="msg-body">{m.body}</div>
                  <div className="msg-acts"><button className="icon-btn danger" style={{fontSize:11}} onClick={e=>{ e.stopPropagation(); deleteMessage(m.id); }}>🗑 削除</button></div>
                </div>
              ))}
            </div>
          </div>
        )}

        {sec==="theme"&&(
          <div className="fadein">
            <div className="admin-title">デザイン・テーマ</div>
            <div className="form-group"><label className="form-label">プリセットテーマ</label>
              <div className="theme-grid">
                {THEMES.map(t=>(
                  <div key={t.label} className={`theme-swatch ${site.theme?.bg===t.bg&&site.theme?.accent===t.accent?"sel":""}`} onClick={()=>setSite(s=>({...s,theme:{...s.theme,bg:t.bg,accent:t.accent}}))}>
                    <div className="theme-swatch-preview" style={{background:`linear-gradient(135deg,${t.bg},color-mix(in srgb,${t.bg} 60%,${t.accent} 40%))`}}/>
                    <div className="theme-swatch-label">{t.label}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="form-row">
              <ColorPicker label="背景色" value={site.theme?.bg||"#07070f"} onChange={v=>setSite(s=>({...s,theme:{...s.theme,bg:v}}))}/>
              <ColorPicker label="アクセント" value={site.theme?.accent||"#c8a86a"} onChange={v=>setSite(s=>({...s,theme:{...s.theme,accent:v}}))}/>
            </div>
            <div className="form-group"><label className="form-label">フォント</label>
              <div className="font-grid">
                {[{val:"serif",name:"明朝体",preview:"Cormorant"},{val:"gothic",name:"ゴシック体",preview:"ゴシック"}].map(f=>(
                  <button key={f.val} className={`font-btn ${site.theme?.font===f.val?"sel":""}`} onClick={()=>setSite(s=>({...s,theme:{...s.theme,font:f.val}}))}>
                    <div className="font-btn-name" style={{fontFamily:f.val==="serif"?"'Cormorant Garamond',serif":"'Noto Sans JP',sans-serif"}}>{f.preview}</div>
                    <div className="font-btn-label">{f.name}</div>
                  </button>
                ))}
              </div>
            </div>
            <button className="btn btn-primary" onClick={()=>flash()}>保存する</button><span style={{marginLeft:12,fontSize:12,color:"var(--accent)"}}>{saving?"⌛ 保存中…":saved?"✓ 保存しました":""}</span>
          </div>
        )}

        {sec==="novels"&&(
          <div className="fadein">
            <div className="admin-title">作品管理</div>
            <div className="alist">
              {novels.length===0&&<div style={{padding:"24px",color:"var(--txt3)",fontSize:13}}>作品がありません</div>}
              {novels.map(n=>(
                <div key={n.id} className="arow">
                  <div className="arow-dot" style={{background:n.accent,boxShadow:`0 0 8px ${n.accent}66`}}/>
                  <div className="arow-info"><div className="arow-title">{n.title}</div><div className="arow-meta">{n.author} · {(n.chapters||[]).length}章 · {n.genre}</div></div>
                  <div className="arow-actions">
                    <button className="icon-btn primary" onClick={()=>{ setEditNid(n.id); setSec("novel_edit"); }}>✏️ 編集</button>
                    <button className="icon-btn danger" onClick={()=>setDelConfirm({type:"novel",id:n.id,label:n.title})}>🗑</button>
                  </div>
                </div>
              ))}
            </div>
            <button className="btn btn-primary" onClick={()=>{ const id=addNovel(); setEditNid(id); setSec("novel_edit"); }}>＋ 新しい作品を追加</button>
          </div>
        )}

        {sec==="novel_edit"&&eNov&&(
          <div className="fadein">
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:32}}>
              <button className="back-link" onClick={()=>setSec("novels")}>← 作品一覧</button>
              <div className="admin-title" style={{margin:0}}>{eNov.title}</div>
            </div>
            <div className="gradient-preview" style={{background:`linear-gradient(160deg,${eNov.color1},${eNov.color2})`}}/>
            <div className="form-row">
              <ColorPicker label="カバー色①" value={eNov.color1} onChange={v=>updateNovel(eNov.id,{color1:v})}/>
              <ColorPicker label="カバー色②" value={eNov.color2} onChange={v=>updateNovel(eNov.id,{color2:v})}/>
            </div>
            <ColorPicker label="アクセントドット" value={eNov.accent} onChange={v=>updateNovel(eNov.id,{accent:v})}/>
            <div className="form-row">
              <div className="form-group"><label className="form-label">タイトル</label><input className="form-input" value={eNov.title} onChange={e=>updateNovel(eNov.id,{title:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">サブタイトル</label><input className="form-input" value={eNov.subtitle} onChange={e=>updateNovel(eNov.id,{subtitle:e.target.value})}/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">著者名</label><input className="form-input" value={eNov.author} onChange={e=>updateNovel(eNov.id,{author:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">ジャンル</label><input className="form-input" value={eNov.genre} onChange={e=>updateNovel(eNov.id,{genre:e.target.value})}/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">文字数</label><input className="form-input" value={eNov.wordCount} onChange={e=>updateNovel(eNov.id,{wordCount:e.target.value})} placeholder="42,000字"/></div>
              <div className="form-group"><label className="form-label">更新日（YYYY-MM-DD）</label><input className="form-input" value={eNov.updated} onChange={e=>updateNovel(eNov.id,{updated:e.target.value})} placeholder="2025-12-01"/></div>
            </div>
            <div className="form-group"><label className="form-label">タグ（カンマ区切り）</label><input className="form-input" value={(eNov.tags||[]).join(", ")} onChange={e=>updateNovel(eNov.id,{tags:e.target.value.split(",").map(t=>t.trim()).filter(Boolean)})}/></div>
            <div className="form-group"><label className="form-label">あらすじ</label><textarea className="form-textarea" value={eNov.description} onChange={e=>updateNovel(eNov.id,{description:e.target.value})} rows={5}/></div>
            <div style={{marginTop:32,paddingTop:24,borderTop:"1px solid var(--border)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <span className="form-label" style={{margin:0}}>章一覧 ({(eNov.chapters||[]).length}章)</span>
                <button className="btn btn-primary" style={{padding:"7px 16px",fontSize:11}} onClick={()=>{ const id=addChapter(eNov.id); setEditCh({nid:eNov.id,cid:id}); setSec("chapter_edit"); }}>＋ 章を追加</button>
              </div>
              <div className="ch-list">
                {(eNov.chapters||[]).length===0&&<div style={{padding:"16px",color:"var(--txt3)",fontSize:12}}>章がありません</div>}
                {(eNov.chapters||[]).map((ch,i)=>(
                  <div key={ch.id} className="ch-row">
                    <span className="ch-num">0{i+1}</span><span className="ch-txt">{ch.title}</span>
                    <div style={{display:"flex",gap:6,marginLeft:"auto"}}>
                      <button className="icon-btn primary" onClick={()=>{ setEditCh({nid:eNov.id,cid:ch.id}); setSec("chapter_edit"); }}>✏️</button>
                      <button className="icon-btn danger" onClick={()=>setDelConfirm({type:"chapter",nid:eNov.id,id:ch.id,label:ch.title})}>🗑</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:24}}>
              <button className="btn btn-primary" onClick={()=>flash()}>保存する</button>
              {saved&&<span style={{lineHeight:"38px",fontSize:12,color:"var(--accent)"}}>✓ 保存しました</span>}
              <button className="btn btn-danger" style={{marginLeft:"auto"}} onClick={()=>setDelConfirm({type:"novel",id:eNov.id,label:eNov.title})}>この作品を削除</button>
            </div>
          </div>
        )}

        {sec==="chapter_edit"&&editCh&&(()=>{
          const nov=novels.find(n=>n.id===editCh.nid);
          const ch=(nov?.chapters||[]).find(c=>c.id===editCh.cid);
          if(!nov||!ch)return null;
          return(
            <div className="fadein">
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:32}}>
                <button className="back-link" onClick={()=>setSec("novel_edit")}>← {nov.title}</button>
                <div className="admin-title" style={{margin:0}}>章を編集</div>
              </div>
              <div className="form-group"><label className="form-label">章タイトル</label><input className="form-input" value={ch.title} onChange={e=>updateChapter(nov.id,ch.id,{title:e.target.value})}/></div>
              <div className="form-group">
                <label className="form-label">本文</label>
                <textarea className="form-textarea" value={ch.content} onChange={e=>updateChapter(nov.id,ch.id,{content:e.target.value})} rows={24} style={{fontFamily:"'Noto Serif JP',serif",fontSize:14,lineHeight:2}}/>
                <div className="form-hint">段落の区切りは空行（Enterキー2回）</div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-primary" onClick={()=>flash()}>保存する</button>
                {saved&&<span style={{lineHeight:"38px",fontSize:12,color:"var(--accent)"}}>✓ 保存しました</span>}
                <button className="btn btn-danger" style={{marginLeft:"auto"}} onClick={()=>setDelConfirm({type:"chapter",nid:nov.id,id:ch.id,label:ch.title})}>この章を削除</button>
              </div>
            </div>
          );
        })()}
      </div>

        {/* ── ギャラリー管理（AI分析） ── */}
        {sec==="gallery"&&(
          <div className="fadein">
            <div className="admin-title">ギャラリー管理</div>
            <GalleryAdminPanel
              novels={novels}
              gallery={gallery}
              setGallery={setGallery}
              flash={flash}
              saved={saved}
              saving={saving}
            />
          </div>
        )}

      <div className="save-bar"><div className="save-status">{saving?"⌛ 保存中…":saved?"✓ 変更を保存しました":"データはFirestoreに自動保存されます"}</div></div>

      {delConfirm&&(
        <div className="modal-bg">
          <div className="modal fadein">
            <div className="modal-title">削除の確認</div>
            <p style={{color:"var(--txt2)",lineHeight:1.9,fontSize:14}}>「<b style={{color:"var(--txt)"}}>{delConfirm.label}</b>」を削除しますか？<br/>この操作は元に戻せません。</p>
            <div className="modal-actions">
              <button className="btn" onClick={()=>setDelConfirm(null)}>キャンセル</button>
              <button className="btn btn-danger" onClick={()=>{
                if(delConfirm.type==="novel"){ deleteNovel(delConfirm.id); setSec("novels"); setEditNid(null); }
                if(delConfirm.type==="chapter"){ deleteChapter(delConfirm.nid,delConfirm.id); setSec("novel_edit"); }
                setDelConfirm(null);
              }}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════ ROOT ═══════════════
function App(){
  const store=useStore();
  const {site,author,novels,gallery,addMessage,loading,dbError}=store;
  const [page,setPage]=useState("home");
  const [novel,setNovel]=useState(null);
  const [chapterId,setChapterId]=useState(null);
  const [adminOpen,setAdminOpen]=useState(false);
  const [showLogin,setShowLogin]=useState(false);
  const [authed,setAuthed]=useState(false);

  const nav=p=>{ setPage(p); window.scrollTo({top:0,behavior:"smooth"}); };
  const openNovel=n=>{ setNovel(n); nav("detail"); };
  const openChapter=id=>{ setChapterId(id); nav("reading"); };
  const liveNovel=novel?novels.find(n=>n.id===novel.id)||novel:null;

  // タブタイトル
  useEffect(()=>{
    const base=site.name||"文藻";
    if(page==="home") document.title=base;
    else if(page==="gallery") document.title=`ギャラリー — ${base}`;
    else if(page==="hitorigoto") document.title=`ひとりごと — ${base}`;
    else if(page==="profile") document.title=`著者プロフィール — ${base}`;
    else if(page==="detail"&&liveNovel) document.title=`${liveNovel.title} — ${base}`;
    else if(page==="reading"&&liveNovel){
      const ch=(liveNovel.chapters||[]).find(c=>c.id===chapterId);
      document.title=ch?`${ch.title} — ${liveNovel.title}`:`${liveNovel.title} — ${base}`;
    }
  },[page,liveNovel,chapterId,site.name]);

  // ファビコン
  useEffect(()=>{
    let href;
    if(author.icon){ href=author.icon; }
    else{
      const l=(site.name||"文").charAt(0);
      const a=site.theme?.accent||"#c8a86a"; const b=site.theme?.bg||"#07070f";
      const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="${b}"/><text x="32" y="46" font-size="36" text-anchor="middle" fill="${a}" font-family="serif">${l}</text></svg>`;
      href=`data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }
    let link=document.querySelector("link[rel~='icon']");
    if(!link){ link=document.createElement("link"); link.rel="icon"; document.head.appendChild(link); }
    link.href=href;
  },[author.icon,site.name,site.theme?.accent,site.theme?.bg]);

  // ロゴ5連打でログイン
  const clicks=useRef(0); const timer=useRef(null);
  const handleLogoClick=()=>{
    clicks.current+=1; clearTimeout(timer.current);
    timer.current=setTimeout(()=>{ clicks.current=0; },1500);
    if(clicks.current>=5){ clicks.current=0; if(authed)setAdminOpen(true); else setShowLogin(true); }
  };

  return(
    <>
      <Styles site={site}/>
      <div className="app">
        {loading&&(
          <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",zIndex:9000,gap:20}}>
            <div style={{fontFamily:"var(--serif)",fontSize:32,color:"var(--accent)",letterSpacing:"0.12em"}}>{site.name||"文藻"}</div>
            <div style={{width:40,height:2,background:"var(--border)",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,background:"var(--accent)",animation:"loadbar 1.2s ease infinite"}}/>
            </div>
            <style>{`@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}`}</style>
          </div>
        )}
        {!loading&&dbError&&(
          <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",zIndex:9000,gap:16,padding:40}}>
            <div style={{fontSize:32}}>🔥</div>
            <div style={{fontFamily:"var(--serif)",fontSize:22,color:"var(--txt)"}}>Firebase接続エラー</div>
            <div style={{fontSize:13,color:"var(--txt3)",maxWidth:480,textAlign:"center",lineHeight:1.9}}>{dbError}</div>
            <div style={{fontSize:12,color:"var(--txt3)",maxWidth:480,textAlign:"center",lineHeight:2,marginTop:8,border:"1px solid var(--border)",padding:"16px 20px",borderRadius:3}}>
              <b style={{color:"var(--txt2)"}}>設定手順：</b><br/>
              1. <a href="https://console.firebase.google.com/" target="_blank" style={{color:"var(--accent)"}}>Firebase Console</a> でプロジェクトを作成<br/>
              2. Firestore Database を有効化（テストモードで開始）<br/>
              3. Storage を有効化<br/>
              4. プロジェクト設定 → ウェブアプリを追加 → 設定値をコピー<br/>
              5. このHTMLの <code style={{background:"var(--surface)",padding:"1px 5px"}}>FIREBASE_CONFIG</code> を書き換えて保存
            </div>
          </div>
        )}
        {!loading&&!dbError&&!adminOpen&&page!=="reading"&&(
          <Nav page={page} onNav={nav} site={site} onLogoClick={handleLogoClick}/>
        )}
        {!loading&&!dbError&&!adminOpen&&page==="home"&&<HomePage site={site} novels={novels} onOpen={openNovel}/>}
        {!loading&&!dbError&&!adminOpen&&page==="gallery"&&<GalleryPage gallery={gallery} novels={novels} site={site}/>}
        {!loading&&!dbError&&!adminOpen&&page==="hitorigoto"&&<HitorigotoPage author={author}/>}
        {!loading&&!dbError&&!adminOpen&&page==="detail"&&liveNovel&&<DetailPage novel={liveNovel} onBack={()=>nav("home")} onRead={openChapter} onSendMessage={addMessage}/>}
        {!loading&&!dbError&&!adminOpen&&page==="reading"&&liveNovel&&chapterId&&<ReadingPage novel={liveNovel} chapterId={chapterId} onBack={()=>nav("detail")} onChapter={setChapterId}/>}
        {!loading&&!dbError&&!adminOpen&&page==="profile"&&<ProfilePage author={author} novels={novels} onToWorks={()=>nav("home")} site={site} onSendMessage={addMessage}/>}
        {!loading&&!dbError&&adminOpen&&<AdminPanel store={store} onClose={()=>setAdminOpen(false)}/>}
        {showLogin&&<LoginModal onSuccess={()=>{ setAuthed(true); setShowLogin(false); setAdminOpen(true); }} onCancel={()=>setShowLogin(false)}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
