// ═══════════════ FIREBASE HELPERS ═══════════════
// ファイル（画像など）をFirebase Storageにアップロードし、URLを返す
async function uploadFile(file, path) {
  const ref = storage.ref(path);
  await ref.putString(file.data, "data_url");
  return await ref.getDownloadURL();
}

// base64データURIかどうかを判定
const isDataUri = s => typeof s === "string" && s.startsWith("data:");

// ひとりごとのファイル添付をStorageへアップロードし、URLに変換する
async function uploadMurmurFiles(murmurId, files) {
  return await Promise.all((files||[]).map(async (f, i) => {
    if (!isDataUri(f.data)) return f; // すでにURL済みはスキップ
    const ext = f.name.split(".").pop();
    const path = `murmurs/${murmurId}/file_${i}.${ext}`;
    const url = await uploadFile(f, path);
    return { ...f, data: url };
  }));
}

// 著者アイコンをStorageへアップロード
async function uploadAuthorIcon(dataUri) {
  if (!isDataUri(dataUri)) return dataUri;
  const ref = storage.ref("author/icon.jpg");
  await ref.putString(dataUri, "data_url");
  return await ref.getDownloadURL();
}

// ═══════════════ FIRESTORE STORE ═══════════════
function useStore() {
  const [site,    setSiteLocal]   = useState(DEFAULT_SITE);
  const [author,  setAuthorLocal] = useState(DEFAULT_AUTHOR);
  const [novels,  setNovelsLocal] = useState([]);
  const [messages,setMsgLocal]    = useState([]);
  const [loading, setLoading]     = useState(true);
  const [dbError, setDbError]     = useState(null);

  // ── リアルタイムリスナーで全データを購読 ──
  useEffect(() => {
    const unsubs = [];
    let resolved = 0;
    const check = () => { resolved++; if(resolved >= 4) setLoading(false); };

    // settings/site
    unsubs.push(db.collection("settings").doc("site").onSnapshot(snap => {
      if (snap.exists) setSiteLocal(snap.data()); else setSiteLocal(DEFAULT_SITE);
      check();
    }, e => { setDbError(e.message); check(); }));

    // settings/author
    unsubs.push(db.collection("settings").doc("author").onSnapshot(snap => {
      if (snap.exists) setAuthorLocal(snap.data()); else setAuthorLocal(DEFAULT_AUTHOR);
      check();
    }, e => { setDbError(e.message); check(); }));

    // novels — ordered by createdAt
    unsubs.push(db.collection("novels").orderBy("createdAt","asc").onSnapshot(snap => {
      setNovelsLocal(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      check();
    }, e => { setDbError(e.message); check(); }));

    // messages — ordered by createdAt desc
    unsubs.push(db.collection("messages").orderBy("createdAt","desc").onSnapshot(snap => {
      setMsgLocal(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      check();
    }, e => { setDbError(e.message); check(); }));

    return () => unsubs.forEach(u => u());
  }, []);

  const uid = () => db.collection("_").doc().id; // Firestore自動ID

  // ── サイト設定 ──
  const setSite = useCallback(async v => {
    const next = typeof v === "function" ? v(site) : v;
    setSiteLocal(next);
    try { await db.collection("settings").doc("site").set(next); } catch(e) { console.error(e); }
  }, [site]);

  // ── 著者 ──
  const setAuthor = useCallback(async v => {
    const next = typeof v === "function" ? v(author) : v;
    // アイコンがbase64ならStorageへ先にアップロード
    let toSave = next;
    if (isDataUri(next.icon)) {
      try {
        const url = await uploadAuthorIcon(next.icon);
        toSave = { ...next, icon: url };
        setAuthorLocal(toSave);
      } catch(e) { console.error(e); }
    } else {
      setAuthorLocal(next);
    }
    try { await db.collection("settings").doc("author").set(toSave); } catch(e) { console.error(e); }
  }, [author]);

  // ── 作品 ──
  const addNovel = async () => {
    const now = firebase.firestore.FieldValue.serverTimestamp();
    const data = {
      title:"新しい作品", subtitle:"", author:author.name, genre:"小説",
      tags:[], description:"", color1:"#0a0a14", color2:"#1a1a2e", accent:"#c8a86a",
      wordCount:"", updated: new Date().toISOString().slice(0,7),
      chapters:[], createdAt: now, pinned:false, locked:false,
    };
    const ref = await db.collection("novels").add(data);
    return ref.id;
  };
  const updateNovel = async (id, patch) => {
    setNovelsLocal(a => a.map(n => n.id===id ? {...n,...patch} : n)); // 楽観的更新
    try { await db.collection("novels").doc(id).update(patch); } catch(e) { console.error(e); }
  };
  const deleteNovel = async id => {
    setNovelsLocal(a => a.filter(n => n.id!==id));
    try { await db.collection("novels").doc(id).delete(); } catch(e) { console.error(e); }
  };

  // ── 章（小説ドキュメント内のchapters配列で管理） ──
  const addChapter = async nid => {
    const cid = uid();
    const ch = { id: cid, title:"新しい章", content:"" };
    const novel = novels.find(n => n.id===nid);
    const updated = [...(novel?.chapters||[]), ch];
    setNovelsLocal(a => a.map(n => n.id===nid ? {...n, chapters:updated} : n));
    try { await db.collection("novels").doc(nid).update({ chapters: updated }); } catch(e) { console.error(e); }
    return cid;
  };
  const updateChapter = async (nid, cid, patch) => {
    const novel = novels.find(n => n.id===nid);
    const updated = (novel?.chapters||[]).map(c => c.id===cid ? {...c,...patch} : c);
    setNovelsLocal(a => a.map(n => n.id===nid ? {...n, chapters:updated} : n));
    try { await db.collection("novels").doc(nid).update({ chapters: updated }); } catch(e) { console.error(e); }
  };
  const deleteChapter = async (nid, cid) => {
    const novel = novels.find(n => n.id===nid);
    const updated = (novel?.chapters||[]).filter(c => c.id!==cid);
    setNovelsLocal(a => a.map(n => n.id===nid ? {...n, chapters:updated} : n));
    try { await db.collection("novels").doc(nid).update({ chapters: updated }); } catch(e) { console.error(e); }
  };

  // ── メッセージ ──
  const addMessage = async m => {
    const data = { ...m, date: new Date().toLocaleString("ja-JP"), read: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp() };
    try { await db.collection("messages").add(data); } catch(e) { console.error(e); }
  };
  const deleteMessage = async id => {
    setMsgLocal(a => a.filter(m => m.id!==id));
    try { await db.collection("messages").doc(id).delete(); } catch(e) { console.error(e); }
  };
  const markRead = async id => {
    setMsgLocal(a => a.map(m => m.id===id ? {...m,read:true} : m));
    try { await db.collection("messages").doc(id).update({ read: true }); } catch(e) { console.error(e); }
  };

  // ── ひとりごと（author.murmurs配列で管理） ──
  const addMurmur = async (text, files) => {
    const mid = uid();
    const now = new Date();
    // ファイルをStorageへアップロード
    let uploadedFiles = [];
    try { uploadedFiles = await uploadMurmurFiles(mid, files||[]); } catch(e) { console.error(e); }
    const m = { id: mid, text, files: uploadedFiles, date: now.toLocaleString("ja-JP"), isoDate: now.toISOString() };
    const nextMurmurs = [m, ...(author.murmurs||[])];
    setAuthorLocal(a => ({...a, murmurs: nextMurmurs}));
    try { await db.collection("settings").doc("author").update({ murmurs: nextMurmurs }); } catch(e) { console.error(e); }
  };
  const deleteMurmur = async id => {
    const nextMurmurs = (author.murmurs||[]).filter(m => m.id!==id);
    setAuthorLocal(a => ({...a, murmurs: nextMurmurs}));
    try { await db.collection("settings").doc("author").update({ murmurs: nextMurmurs }); } catch(e) { console.error(e); }
  };

  return { site, setSite, author, setAuthor, novels, messages, loading, dbError,
    addMessage, deleteMessage, markRead,
    addNovel, updateNovel, deleteNovel, addChapter, updateChapter, deleteChapter,
    addMurmur, deleteMurmur };
}

// ═══════════════ HELPERS ═══════════════
function groupByYM(items, getISO) {
  const map = new Map();
  items.forEach(item => {
    let ym = "不明";
    try { const d=new Date(getISO(item)); if(!isNaN(d)) ym=`${d.getFullYear()}年${d.getMonth()+1}月`; } catch {}
    if(!map.has(ym)) map.set(ym,[]);
    map.get(ym).push(item);
  });
  return [...map.entries()];
}

    .color-row{display:flex;align-items:center;gap:12px}.color-swatch{width:36px;height:36px;border-radius:3px;border:1px solid rgba(255,255,255,.2);cursor:pointer;flex-shrink:0;transition:transform .15s}.color-swatch:hover{transform:scale(1.08)}.color-input-hidden{width:0;height:0;opacity:0;position:absolute}

    .theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.theme-swatch{border:2px solid transparent;border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .2s}.theme-swatch.sel{border-color:var(--accent)}.theme-swatch-preview{height:52px}.theme-swatch-label{font-size:9px;letter-spacing:.2em;color:var(--txt3);text-transform:uppercase;padding:5px 6px;text-align:center;background:var(--surface)}

    .badge{background:var(--accent);color:var(--bg);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:6px}

    .novel-badge-pin{font-size:10px;background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);padding:1px 7px;border-radius:2px;letter-spacing:.08em;flex-shrink:0}
    .novel-badge-lock{font-size:10px;background:rgba(239,68,68,.12);border:1px solid #ef4444;color:#ef4444;padding:1px 7px;border-radius:2px;letter-spacing:.08em;flex-shrink:0}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
    .toggle-label{font-size:13px;color:var(--txt);letter-spacing:.04em}
    .toggle-desc{font-size:11px;color:var(--txt2);margin-top:2px}
    .toggle-switch{position:relative;width:42px;height:24px;flex-shrink:0}

    .wc-stat b{color:var(--accent);font-weight:400}
    .mobile-back-btn{display:none}
    @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    @keyframes fadein{from{opacity:0}to{opacity:1}}.fadein{animation:fadein .3s ease forwards}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border-hi)}
    @media(max-width:680px){
      .nav{padding:0 16px}.hero{padding:100px 20px 60px}.section,.detail-body{padding-left:20px;padding-right:20px}

      .profile-wrap,.htg-wrap{padding:100px 20px 72px}.footer{padding:32px 20px}
      .admin-overlay{flex-direction:column}
      /* モバイル：メニュー選択前はサイドバーのみ、選択後はメインのみ */
      .admin-sidebar{width:100%;max-height:none;height:100%}
      .admin-main{display:none;padding:20px 16px 120px}
      .admin-overlay.menu-selected .admin-sidebar{display:none}
      .admin-overlay.menu-selected .admin-main{display:block}
      .save-bar{left:0}
      .form-row{grid-template-columns:1fr}
      /* モバイル戻るボタン */
      .mobile-back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--accent);font-family:var(--body);font-size:13px;letter-spacing:.08em;padding:0 0 20px;cursor:pointer}
    }
  `);
}

function ColorPicker({label,value,onChange}){
  const ref=useRef();
  return(
    <div className="form-group">
      <label className="form-label">{label}</label>
      <div className="color-row">
        <div className="color-swatch" style={{background:value}} onClick={()=>ref.current?.click()}/>
        <input ref={ref} type="color" value={value} onChange={e=>onChange(e.target.value)} className="color-input-hidden"/>
        <input className="form-input" style={{flex:1}} value={value} onChange={e=>onChange(e.target.value)}/>
      </div>
    </div>
  );
}

function useReadingProgress(){
  const [p,setP]=useState(0);
  useEffect(()=>{
    const fn=()=>{ const el=document.documentElement; const h=el.scrollHeight-el.clientHeight; setP(h>0?(el.scrollTop/h)*100:0); };
    window.addEventListener("scroll",fn); return()=>window.removeEventListener("scroll",fn);
  },[]);
  return p;
}

// 本文から文字数を実カウント（空白・改行除く）
function countChars(novel) {
  return (novel.chapters||[]).reduce((s,ch)=>s+(ch.content||"").replace(/\s/g,"").length, 0);
}
function fmtCount(n) {
  if(n===0) return "0字";
  if(n>=10000) return `${(n/10000).toFixed(1)}万字`;
  return `${n.toLocaleString()}字`;
}

// ═══════════════ READING ═══════════════
// 改行ルール：1改行→段落、空行（連続改行）→そのまま空白として表示
function renderBody(content) {
  const lines = content.split("\n");
  const result = [];
  lines.forEach((line, i) => {
    if (line.trim() === "") {
      // 空行 → 視覚的な空白行
      result.push(<div key={`blank-${i}`} style={{height:"1.4em"}}/>);
    } else {
      result.push(<p key={`p-${i}`}>{line}</p>);
    }
  });
  return result;
}

function ReadingPage({novel,chapterId,onBack,onChapter}){
  const ch=(novel.chapters||[]).find(c=>c.id===chapterId);
  const idx=(novel.chapters||[]).findIndex(c=>c.id===chapterId);
  const prev=(novel.chapters||[])[idx-1]||null;
  const next=(novel.chapters||[])[idx+1]||null;
  const progress=useReadingProgress();
  useEffect(()=>window.scrollTo({top:0,behavior:"smooth"}),[chapterId]);
  if(!ch)return null;
  return(
    <div className="reading-wrap">
      <div className="reading-nav">
        <button className="reading-back" onClick={onBack}>←</button>
        <div className="reading-crumb"><b>{novel.title}</b>　／　{ch.title}</div>
      </div>
      <div className="progress-rail"><div className="progress-fill" style={{width:`${progress}%`}}/></div>
      <div className="reading-content">
        <div className="reading-eyebrow rise d1">{String(idx+1).padStart(2,"0")} / {(novel.chapters||[]).length}</div>
        <h2 className="reading-ch-title rise d2">{ch.title}</h2>
        <div className="reading-body rise d3">{renderBody(ch.content)}</div>
      </div>
      <div className="reading-foot">
        <button className="reading-foot-btn" disabled={!prev} onClick={()=>prev&&onChapter(prev.id)}>← 前の章</button>
        <div className="reading-foot-pos">{idx+1} / {(novel.chapters||[]).length}</div>
        <button className="reading-foot-btn" disabled={!next} onClick={()=>next&&onChapter(next.id)}>次の章 →</button>
      </div>
    </div>
  );
}

              </div>
              <input ref={fileRef} type="file" multiple accept="image/*,application/pdf,.txt,.doc,.docx" style={{display:"none"}} onChange={handleFiles}/>

                    <div className="arow-title">
                      {n.pinned&&<span style={{marginRight:6,fontSize:11}}>📌</span>}
                      {n.locked&&<span style={{marginRight:6,fontSize:11}}>🔒</span>}
                      {n.title}
                    </div>
                    <div className="arow-meta">{n.author} · {(n.chapters||[]).length}章 · {fmtCount(countChars(n))}</div>
                  </div>
                  <div className="arow-actions">
                    <button className={`icon-btn ${n.pinned?"primary":""}`} title={n.pinned?"固定解除":"先頭に固定"} onClick={()=>updateNovel(n.id,{pinned:!n.pinned})}>{n.pinned?"📌":"📌"}</button>
                    <button className={`icon-btn ${n.locked?"danger":""}`} title={n.locked?"ロック解除":"削除ロック"} onClick={()=>updateNovel(n.id,{locked:!n.locked})}>{n.locked?"🔒":"🔓"}</button>

          <div className="fadein">
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:32}}>
              <button className="back-link" onClick={()=>setSec("novels")}>← 作品一覧</button>

            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:3,padding:"4px 16px",marginBottom:24}}>
              <div className="toggle-row">
                <div><div className="toggle-label">📌 先頭に固定</div><div className="toggle-desc">作品一覧の最上部に表示されます</div></div>
                <label className="toggle-switch"><input type="checkbox" checked={!!eNov.pinned} onChange={e=>updateNovel(eNov.id,{pinned:e.target.checked})}/><span className="toggle-slider"/></label>
              </div>
              <div className="toggle-row" style={{borderBottom:"none"}}>
                <div><div className="toggle-label">🔒 削除ロック</div><div className="toggle-desc">ONにすると削除ボタンが無効になります</div></div>
                <label className="toggle-switch"><input type="checkbox" checked={!!eNov.locked} onChange={e=>updateNovel(eNov.id,{locked:e.target.checked})}/><span className="toggle-slider"/></label>

            <div style={{background:"var(--surface)",border:"1px solid rgba(255,255,255,.1)",borderRadius:3,padding:"10px 16px",marginBottom:24,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:11,color:"var(--txt2)",letterSpacing:".14em"}}>📝 実文字数（本文から自動計算）</span>
              <span style={{fontFamily:"var(--serif)",fontSize:22,color:"var(--accent)",marginLeft:"auto"}}>{fmtCount(countChars(eNov))}</span>
              <span style={{fontSize:11,color:"var(--txt2)"}}>/ {(eNov.chapters||[]).length}章</span>
            </div>
            {/* カバープレビュー */}
            <div className="gradient-preview" style={{background:`linear-gradient(160deg,${eNov.color1},${eNov.color2})`}}>
              <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 60%)"}}/>
              <div className="gp-dot" style={{background:eNov.accent,color:eNov.accent}}/>
              <div style={{position:"absolute",bottom:16,left:20,right:20}}>
                <div style={{fontFamily:"var(--serif)",fontSize:20,fontWeight:300,color:"#e8e4de",letterSpacing:".06em",textShadow:"0 1px 6px rgba(0,0,0,.7)",lineHeight:1.25,marginBottom:3}}>{eNov.title||"タイトル"}</div>

            <div className="form-row">
              <ColorPicker label="カバー色①" value={eNov.color1} onChange={v=>updateNovel(eNov.id,{color1:v})}/>

            <ColorPicker label="アクセントドット" value={eNov.accent} onChange={v=>updateNovel(eNov.id,{accent:v})}/>
            <div className="form-row">
              <div className="form-group"><label className="form-label">タイトル</label><input className="form-input" value={eNov.title} onChange={e=>updateNovel(eNov.id,{title:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">サブタイトル</label><input className="form-input" value={eNov.subtitle} onChange={e=>updateNovel(eNov.id,{subtitle:e.target.value})}/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">著者名</label><input className="form-input" value={eNov.author} onChange={e=>updateNovel(eNov.id,{author:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">ジャンル</label><input className="form-input" value={eNov.genre} onChange={e=>updateNovel(eNov.id,{genre:e.target.value})}/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">文字数</label><input className="form-input" value={eNov.wordCount} onChange={e=>updateNovel(eNov.id,{wordCount:e.target.value})} placeholder="42,000字"/></div>
              <div className="form-group"><label className="form-label">更新日（YYYY-MM-DD）</label><input className="form-input" value={eNov.updated} onChange={e=>updateNovel(eNov.id,{updated:e.target.value})} placeholder="2025-12-01"/></div>
            </div>
            <div className="form-group"><label className="form-label">タグ（カンマ区切り）</label><input className="form-input" value={(eNov.tags||[]).join(", ")} onChange={e=>updateNovel(eNov.id,{tags:e.target.value.split(",").map(t=>t.trim()).filter(Boolean)})}/></div>
            <div className="form-group"><label className="form-label">あらすじ</label><textarea className="form-textarea" value={eNov.description} onChange={e=>updateNovel(eNov.id,{description:e.target.value})} rows={5}/></div>
            <div style={{marginTop:32,paddingTop:24,borderTop:"1px solid var(--border)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <span className="form-label" style={{margin:0}}>章一覧 ({(eNov.chapters||[]).length}章)</span>
                <button className="btn btn-primary" style={{padding:"7px 16px",fontSize:11}} onClick={async()=>{ const id=await addChapter(eNov.id); setEditCh({nid:eNov.id,cid:id}); setSec("chapter_edit"); setMenuSelected(true); }}>＋ 章を追加</button>
              </div>
              <div className="ch-list">
                {(eNov.chapters||[]).length===0&&<div style={{padding:"16px",color:"var(--txt3)",fontSize:12}}>章がありません</div>}
                {(eNov.chapters||[]).map((ch,i)=>(
                  <div key={ch.id} className="ch-row">
                    <span className="ch-num">0{i+1}</span><span className="ch-txt">{ch.title}</span>
                    <div style={{display:"flex",gap:6,marginLeft:"auto"}}>
                      <button className="icon-btn primary" onClick={()=>{ setEditCh({nid:eNov.id,cid:ch.id}); setSec("chapter_edit"); setMenuSelected(true); }}>✏️</button>
                      <button className="icon-btn danger" onClick={()=>setDelConfirm({type:"chapter",nid:eNov.id,id:ch.id,label:ch.title})}>🗑</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:24}}>
              <button className="btn btn-primary" onClick={()=>flash()}>保存する</button>
              {saved&&<span style={{lineHeight:"38px",fontSize:12,color:"var(--accent)"}}>✓ 保存しました</span>}
              <button className="btn btn-danger" style={{marginLeft:"auto",opacity:eNov.locked?.3:1,cursor:eNov.locked?"not-allowed":"pointer"}} disabled={!!eNov.locked} onClick={()=>!eNov.locked&&setDelConfirm({type:"novel",id:eNov.id,label:eNov.title})}>{eNov.locked?"🔒 ロック中（削除不可）":"この作品を削除"}</button>
            </div>
          </div>
        )}

        {sec==="chapter_edit"&&editCh&&(()=>{
          const nov=novels.find(n=>n.id===editCh.nid);
          const ch=(nov?.chapters||[]).find(c=>c.id===editCh.cid);
          if(!nov||!ch)return null;
          return(
            <div className="fadein">
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:32}}>
                <button className="back-link" onClick={()=>setSec("novel_edit")}>← {nov.title}</button>
                <div className="admin-title" style={{margin:0}}>章を編集</div>
              </div>
              <div className="form-group"><label className="form-label">章タイトル</label><input className="form-input" value={ch.title} onChange={e=>updateChapter(nov.id,ch.id,{title:e.target.value})}/></div>
              <div className="form-group">
                <label className="form-label">本文</label>
                <textarea className="form-textarea" value={ch.content} onChange={e=>updateChapter(nov.id,ch.id,{content:e.target.value})} rows={24} style={{fontFamily:"'Noto Serif JP',serif",fontSize:14,lineHeight:2}}/>
                <div className="form-hint">段落の区切りは空行（Enterキー2回）</div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button className="btn btn-primary" onClick={()=>flash()}>保存する</button>
                {saved&&<span style={{lineHeight:"38px",fontSize:12,color:"var(--accent)"}}>✓ 保存しました</span>}
                <button className="btn btn-danger" style={{marginLeft:"auto"}} onClick={()=>setDelConfirm({type:"chapter",nid:nov.id,id:ch.id,label:ch.title})}>この章を削除</button>
              </div>
            </div>
          );
        })()}
      </div>

      <div className="save-bar"><div className="save-status" style={{color:"var(--txt2)"}}>{saving?"⌛ 保存中…":saved?"✓ 変更を保存しました":"データはFirestoreに自動保存されます"}</div></div>

      {delConfirm&&(
        <div className="modal-bg">
          <div className="modal fadein">
            <div className="modal-title">削除の確認</div>
            <p style={{color:"var(--txt2)",lineHeight:1.9,fontSize:14}}>「<b style={{color:"var(--txt)"}}>{delConfirm.label}</b>」を削除しますか？<br/>この操作は元に戻せません。</p>
            <div className="modal-actions">
              <button className="btn" onClick={()=>setDelConfirm(null)}>キャンセル</button>
              <button className="btn btn-danger" onClick={()=>{
                if(delConfirm.type==="novel"){ deleteNovel(delConfirm.id); setSec("novels"); setEditNid(null); setMenuSelected(true); }
                if(delConfirm.type==="chapter"){ deleteChapter(delConfirm.nid,delConfirm.id); setSec("novel_edit"); }
                setDelConfirm(null);
              }}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════ ROOT ═══════════════
function App(){
  const store=useStore();
  const {site,author,novels,addMessage,loading,dbError}=store;
  const [page,setPage]=useState("home");
  const [novel,setNovel]=useState(null);
  const [chapterId,setChapterId]=useState(null);
  const [adminOpen,setAdminOpen]=useState(false);
  const [showLogin,setShowLogin]=useState(false);
  const [authed,setAuthed]=useState(false);

  const nav=p=>{ setPage(p); window.scrollTo({top:0,behavior:"smooth"}); };
  const openNovel=n=>{ setNovel(n); nav("detail"); };
  const openChapter=id=>{ setChapterId(id); nav("reading"); };
  const liveNovel=novel?novels.find(n=>n.id===novel.id)||novel:null;

  // タブタイトル
  useEffect(()=>{
    const base=site.name||"文藻";
    if(page==="home") document.title=base;
    else if(page==="hitorigoto") document.title=`ひとりごと — ${base}`;
    else if(page==="profile") document.title=`著者プロフィール — ${base}`;
    else if(page==="detail"&&liveNovel) document.title=`${liveNovel.title} — ${base}`;
    else if(page==="reading"&&liveNovel){
      const ch=(liveNovel.chapters||[]).find(c=>c.id===chapterId);
      document.title=ch?`${ch.title} — ${liveNovel.title}`:`${liveNovel.title} — ${base}`;
    }
  },[page,liveNovel,chapterId,site.name]);

  // ファビコン
  useEffect(()=>{
    let href;
    if(author.icon){ href=author.icon; }
    else{
      const l=(site.name||"文").charAt(0);
      const a=site.theme?.accent||"#c8a86a"; const b=site.theme?.bg||"#07070f";
      const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="${b}"/><text x="32" y="46" font-size="36" text-anchor="middle" fill="${a}" font-family="serif">${l}</text></svg>`;
      href=`data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }
    let link=document.querySelector("link[rel~='icon']");
    if(!link){ link=document.createElement("link"); link.rel="icon"; document.head.appendChild(link); }
    link.href=href;
  },[author.icon,site.name,site.theme?.accent,site.theme?.bg]);

  // ロゴ5連打でログイン
  const clicks=useRef(0); const timer=useRef(null);
  const handleLogoClick=()=>{
    clicks.current+=1; clearTimeout(timer.current);
    timer.current=setTimeout(()=>{ clicks.current=0; },1500);
    if(clicks.current>=5){ clicks.current=0; if(authed)setAdminOpen(true); else setShowLogin(true); }
  };

  return(
    <>
      <Styles site={site}/>
      <div className="app">
        {loading&&(
          <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",zIndex:9000,gap:20}}>
            <div style={{fontFamily:"var(--serif)",fontSize:32,color:"var(--accent)",letterSpacing:"0.12em"}}>{site.name||"文藻"}</div>
            <div style={{width:40,height:2,background:"var(--border)",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,background:"var(--accent)",animation:"loadbar 1.2s ease infinite"}}/>
            </div>
            <style>{`@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}`}</style>
          </div>
        )}
        {!loading&&dbError&&(
          <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",zIndex:9000,gap:16,padding:40}}>
            <div style={{fontSize:32}}>🔥</div>
            <div style={{fontFamily:"var(--serif)",fontSize:22,color:"var(--txt)"}}>Firebase接続エラー</div>
            <div style={{fontSize:13,color:"var(--txt3)",maxWidth:480,textAlign:"center",lineHeight:1.9}}>{dbError}</div>
            <div style={{fontSize:12,color:"var(--txt3)",maxWidth:480,textAlign:"center",lineHeight:2,marginTop:8,border:"1px solid var(--border)",padding:"16px 20px",borderRadius:3}}>
              <b style={{color:"var(--txt2)"}}>設定手順：</b><br/>
              1. <a href="https://console.firebase.google.com/" target="_blank" style={{color:"var(--accent)"}}>Firebase Console</a> でプロジェクトを作成<br/>
              2. Firestore Database を有効化（テストモードで開始）<br/>
              3. Storage を有効化<br/>
              4. プロジェクト設定 → ウェブアプリを追加 → 設定値をコピー<br/>
              5. このHTMLの <code style={{background:"var(--surface)",padding:"1px 5px"}}>FIREBASE_CONFIG</code> を書き換えて保存
            </div>
          </div>
        )}
        {!loading&&!dbError&&!adminOpen&&page!=="reading"&&(
          <Nav page={page} onNav={nav} site={site} onLogoClick={handleLogoClick}/>
        )}
        {!loading&&!dbError&&!adminOpen&&page==="home"&&<HomePage site={site} novels={novels} onOpen={openNovel}/>}
        {!loading&&!dbError&&!adminOpen&&page==="hitorigoto"&&<HitorigotoPage author={author}/>}
        {!loading&&!dbError&&!adminOpen&&page==="detail"&&liveNovel&&<DetailPage novel={liveNovel} onBack={()=>nav("home")} onRead={openChapter} onSendMessage={addMessage}/>}
        {!loading&&!dbError&&!adminOpen&&page==="reading"&&liveNovel&&chapterId&&<ReadingPage novel={liveNovel} chapterId={chapterId} onBack={()=>nav("detail")} onChapter={setChapterId}/>}
        {!loading&&!dbError&&!adminOpen&&page==="profile"&&<ProfilePage author={author} novels={novels} onToWorks={()=>nav("home")} site={site} onSendMessage={addMessage}/>}
        {!loading&&!dbError&&adminOpen&&<AdminPanel store={store} onClose={()=>setAdminOpen(false)}/>}
        {showLogin&&<LoginModal onSuccess={()=>{ setAuthed(true); setShowLogin(false); setAdminOpen(true); }} onCancel={()=>setShowLogin(false)}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
